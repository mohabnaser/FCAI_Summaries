<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Structures - FCAI Revisions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #050914;
        --line: #1d2c47;
        --text: #e2e8f0;
        --cyan: #22d3ee;
        --green: #34d399;
        --amber: #fbbf24;
        --pink: #f472b6;
        --violet: #a78bfa;
        --accent: var(--violet);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        background:
          radial-gradient(
            circle at top left,
            rgba(167, 139, 250, 0.08),
            transparent 28%
          ),
          linear-gradient(180deg, #04070f 0%, #050914 100%);
        color: var(--text);
        font-family: "Cairo", sans-serif;
        overflow-x: hidden;
      }
      a {
        text-decoration: none;
        color: inherit;
      }
      .back-home {
        position: fixed;
        top: 18px;
        left: 18px;
        z-index: 30;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 9px 16px;
        border-radius: 999px;
        border: 1px solid rgba(167, 139, 250, 0.25);
        background: rgba(11, 17, 32, 0.85);
        color: var(--text);
        font-family: "Cairo", sans-serif;
        font-size: 0.9rem;
        backdrop-filter: blur(8px);
        transition: 0.2s;
      }
      .back-home:hover {
        border-color: var(--violet);
        color: var(--violet);
      }
      .wrap {
        max-width: 1000px;
        margin: 0 auto;
        padding: 80px 20px 20px;
      }
      .hero {
        text-align: center;
        margin-bottom: 40px;
      }
      .hero h1 {
        font-family: "Outfit", sans-serif;
        font-size: 2.5rem;
        color: var(--violet);
        margin-bottom: 10px;
      }
      .hero p {
        opacity: 0.85;
        font-size: 1.1rem;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
      }
      .card {
        position: relative;
        min-height: 150px;
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 24px;
        background: linear-gradient(
          180deg,
          rgba(18, 29, 51, 0.96),
          rgba(12, 20, 36, 0.96)
        );
        display: flex;
        flex-direction: column;
        justify-content: center;
        overflow: hidden;
        transition:
          transform 0.22s ease,
          box-shadow 0.22s ease;
      }
      .card:hover {
        transform: translateY(-6px);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.32);
        border-color: rgba(167, 139, 250, 0.5);
      }
      .card::before {
        content: "";
        position: absolute;
        inset: 0 auto auto 0;
        width: 100%;
        height: 3px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent),
          transparent
        );
      }
      .card h4 {
        position: relative;
        z-index: 1;
        font-family: "Outfit", sans-serif;
        font-size: 1.5rem;
        font-weight: 800;
        color: var(--violet);
        margin-bottom: 8px;
      }
      .card .desc {
        position: relative;
        z-index: 1;
        font-size: 0.95rem;
        opacity: 0.85;
      }
      .icon {
        position: absolute;
        top: 24px;
        right: 24px;
        width: 48px;
        height: 48px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        font-size: 1.5rem;
        color: var(--violet);
        background: rgba(167, 139, 250, 0.08);
        border: 1px solid rgba(167, 139, 250, 0.16);
      }
    </style>
  </head>
  <body>
    <a class="back-home" href="../index.html">↩ العودة للرئيسية</a>
    <main class="wrap">
      <section class="hero">
        <h1>Data Structures</h1>
        <p>Exams, Summaries, and Resources</p>
      </section>
      
      <div class="grid">
        <a class="card" href="2018.html">
          <div class="icon">📄</div>
          <div>
            <h4>Final Exam 2018</h4>
            <div class="desc">Essay exam solutions (PDF)</div>
          </div>
        </a>
        <a class="card" href="2022.html">
          <div class="icon">📝</div>
          <div>
            <h4>Final Exam 2022</h4>
            <div class="desc">Interactive exam questions and answers</div>
          </div>
        </a>
      </div>
    </main>
  </body>
</html>
