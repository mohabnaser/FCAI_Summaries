<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Software - Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#050b18;--panel:#0c1528;--line:#1b3150;--text:#e2e8f0;--muted:#94a3b8;--cyan:#22d3ee;--green:#34d399;--violet:#a78bfa}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;font-family:"Cairo",sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(52,211,153,.16),transparent 28%),radial-gradient(circle at top right,rgba(34,211,238,.14),transparent 26%),linear-gradient(180deg,#040915 0%,#050b18 100%);overflow-x:hidden}
    body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:42px 42px;opacity:.12;pointer-events:none}
    .home-btn{position:fixed;top:18px;left:18px;z-index:20;display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;border:1px solid rgba(34,211,238,.24);background:rgba(8,11,20,.9);color:var(--text);text-decoration:none;font-family:"Outfit",sans-serif;font-size:.82rem;box-shadow:0 10px 30px rgba(0,0,0,.25)}
    .home-btn:hover{background:rgba(34,211,238,.1);border-color:rgba(34,211,238,.45)}
    .wrap{min-height:100vh;display:grid;place-items:center;padding:80px 18px 28px;position:relative;z-index:1}
    .panel{width:min(900px,100%);border:1px solid var(--line);border-radius:30px;background:linear-gradient(135deg,rgba(12,21,40,.96),rgba(8,13,24,.98));box-shadow:0 24px 70px rgba(0,0,0,.35);padding:32px 24px}
    .head{display:flex;align-items:center;gap:12px;margin-bottom:20px}
    .badge{width:50px;height:50px;border-radius:18px;background:linear-gradient(135deg,var(--green),var(--cyan));display:grid;place-items:center;color:#07111f;font-family:"Outfit",sans-serif;font-weight:900}
    .eyebrow{font-family:"Fira Code",monospace;color:var(--cyan);font-size:.8rem;direction:ltr}
    h1{font-family:"Outfit",sans-serif;font-size:clamp(2rem,5vw,3.3rem);line-height:1.06;margin-bottom:12px}
    h1 span{background:linear-gradient(135deg,var(--green),var(--cyan),var(--violet));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    p{color:var(--muted);line-height:1.9;max-width:660px}
    .status{display:inline-flex;align-items:center;gap:8px;margin-top:18px;padding:9px 14px;border-radius:999px;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.18);color:#86efac;font-family:"Outfit",sans-serif;font-size:.85rem}
    .loader{margin:26px 0 18px;display:grid;place-items:center}
    .ring{width:110px;height:110px;border-radius:50%;border:9px solid rgba(34,211,238,.14);border-top-color:var(--green);border-right-color:var(--cyan);animation:spin 1.1s linear infinite;box-shadow:0 0 0 10px rgba(52,211,153,.04)}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}
    .card{border:1px solid var(--line);background:rgba(255,255,255,.03);border-radius:20px;padding:16px}
    .card h3{font-family:"Outfit",sans-serif;font-size:.98rem;margin-bottom:8px}
    .mono{font-family:"Fira Code",monospace;color:var(--muted);font-size:.82rem;direction:ltr}
    .note{margin-top:16px;padding:12px 14px;border-radius:14px;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.18);color:#bbf7d0}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media (max-width:720px){.panel{padding:22px 16px;border-radius:24px}.grid{grid-template-columns:1fr}.home-btn{top:12px;left:12px}.wrap{padding-top:70px}}
  </style>
</head>
<body>
  <a class="home-btn" href="../index.html">↩ العودة للرئيسية</a>
  <main class="wrap">
    <section class="panel">
      <div class="head">
        <div class="badge">SW</div>
        <div>
          <div class="eyebrow">Loading / Software</div>
        </div>
      </div>
      <h1>مادة <span>Software</span> لسه غير متاحة</h1>
      <div class="status">المحتوى قيد الإعداد حالياً</div>
      <div class="loader"><div class="ring" aria-hidden="true"></div></div>
    </section>
  </main>
</body>
</html>
