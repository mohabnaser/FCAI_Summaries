<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🎓 SQL </title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #080b14;
  --bg2: #0d1220;
  --bg3: #111827;
  --card: #141b2d;
  --border: #1e2d4a;
  --violet: #7c3aed;
  --violet-light: #a855f7;
  --cyan: #06b6d4;
  --cyan-light: #67e8f9;
  --green: #10b981;
  --orange: #f59e0b;
  --red: #ef4444;
  --pink: #ec4899;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #475569;
  --glow-v: rgba(124,58,237,0.3);
  --glow-c: rgba(6,182,212,0.2);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--violet); border-radius: 3px; }

/* LAYOUT */
.app-layout { display: flex; height: 100vh; }
.sidebar {
  width: 280px; min-width: 280px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow-y: auto; overflow-x: hidden;
  position: fixed; height: 100vh; right: 0; top: 0; z-index: 50;
  transition: transform 0.3s;
}
.main-content {
  margin-right: 280px;
  flex: 1; overflow-y: auto; overflow-x: hidden;
}
.topbar {
  background: rgba(8,11,20,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  display: flex; align-items: center; gap: 1rem;
  position: sticky; top: 0; z-index: 40;
  height: 64px;
}
.content-area { padding: 2rem; max-width: 1100px; margin: 0 auto; }

/* LOGO */
.logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.1rem; font-weight: 700;
  background: linear-gradient(135deg, var(--violet-light), var(--cyan));
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  padding: 1.5rem 1.25rem 1rem;
  border-bottom: 1px solid var(--border);
}
.logo span { display: block; font-family: 'Cairo', sans-serif; font-size: 0.65rem; color: var(--text2); -webkit-text-fill-color: var(--text2); font-weight: 400; margin-top: 2px; }

/* SIDEBAR NAV */
.nav-section { padding: 0.5rem 0; }
.nav-section-title {
  font-size: 0.6rem; font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase;
  padding: 0.5rem 1.25rem 0.25rem;
}
.nav-item {
  display: flex; align-items: center; gap: 0.6rem;
  padding: 0.45rem 1.25rem; cursor: pointer;
  color: var(--text2); font-size: 0.82rem;
  border-right: 3px solid transparent;
  transition: all 0.15s; position: relative;
}
.nav-item:hover { color: var(--text); background: rgba(124,58,237,0.08); }
.nav-item.active {
  color: var(--violet-light);
  border-right-color: var(--violet);
  background: rgba(124,58,237,0.12);
}
.nav-item .icon { font-size: 0.85rem; width: 18px; text-align: center; }

/* TAB BUTTONS */
.tab-btn {
  padding: 0.4rem 1rem; border-radius: 6px;
  font-size: 0.78rem; font-weight: 600; cursor: pointer;
  border: 1px solid var(--border);
  background: transparent; color: var(--text2);
  transition: all 0.15s; white-space: nowrap;
  font-family: 'Cairo', sans-serif;
}
.tab-btn:hover { border-color: var(--violet); color: var(--violet-light); }
.tab-btn.active {
  background: var(--violet); border-color: var(--violet);
  color: white; box-shadow: 0 0 16px var(--glow-v);
}

/* SECTION HERO */
.section-hero {
  background: linear-gradient(135deg, var(--bg2) 0%, var(--card) 100%);
  border: 1px solid var(--border); border-radius: 16px;
  padding: 2rem; margin-bottom: 2rem; position: relative; overflow: hidden;
}
.section-hero::before {
  content: ''; position: absolute; top: -50%; left: -20%;
  width: 400px; height: 400px; border-radius: 50%;
  background: var(--glow-v); filter: blur(80px); pointer-events: none;
}
.section-hero h1 {
  font-size: 1.8rem; font-weight: 900; margin-bottom: 0.5rem;
  background: linear-gradient(135deg, #fff, var(--violet-light));
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}
.section-hero p { color: var(--text2); font-size: 0.9rem; line-height: 1.7; max-width: 600px; }
.section-badge {
  display: inline-block; padding: 0.25rem 0.75rem;
  background: rgba(124,58,237,0.2); border: 1px solid rgba(124,58,237,0.4);
  border-radius: 100px; font-size: 0.7rem; font-family: 'JetBrains Mono', monospace;
  color: var(--violet-light); margin-bottom: 0.75rem;
}

/* TOPIC CARD */
.topic-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem;
  scroll-margin-top: 80px;
  transition: border-color 0.2s;
}
.topic-card:hover { border-color: rgba(124,58,237,0.4); }
.topic-title {
  font-size: 1.1rem; font-weight: 700; margin-bottom: 0.75rem;
  display: flex; align-items: center; gap: 0.6rem;
}
.topic-title .icon { font-size: 1.2rem; }
.topic-body { color: var(--text2); font-size: 0.88rem; line-height: 1.8; }
.topic-body strong { color: var(--cyan-light); }
.topic-body em { color: var(--orange); font-style: normal; }
.note-box {
  background: rgba(6,182,212,0.08); border: 1px solid rgba(6,182,212,0.25);
  border-radius: 8px; padding: 0.75rem 1rem; margin-top: 0.75rem;
  font-size: 0.82rem; color: var(--cyan-light);
}
.warn-box {
  background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.25);
  border-radius: 8px; padding: 0.75rem 1rem; margin-top: 0.75rem;
  font-size: 0.82rem; color: var(--orange);
}

/* SQL CODE BLOCK */
.sql-block {
  background: #060910; border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden; margin-top: 1rem; font-size: 0.82rem;
}
.sql-block-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.5rem 1rem; background: rgba(255,255,255,0.03);
  border-bottom: 1px solid var(--border); direction: ltr;
}
.sql-block-label {
  font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; direction: ltr;
  color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em;
}
.sql-block-dots { display: flex; gap: 5px; }
.dot { width: 10px; height: 10px; border-radius: 50%; }
.dot-r { background: #ef4444; } .dot-y { background: #f59e0b; } .dot-g { background: #10b981; }
.sql-code {
  font-family: 'JetBrains Mono', monospace; padding: 1rem 1.25rem;
  line-height: 1.7; overflow-x: auto; white-space: pre; direction: ltr; text-align: left;
}
.kw { color: #7c3aed; font-weight: 600; }
.kw2 { color: #a855f7; }
.fn { color: #06b6d4; }
.str { color: #10b981; }
.num { color: #f59e0b; }
.cmt { color: #475569; font-style: italic; }
.op { color: #ec4899; }
.tbl { color: #e2e8f0; }
.col { color: #bfdbfe; }

/* DATA TABLE */
.data-table-wrap { overflow-x: auto; margin-top: 0.75rem; direction: ltr; }
.data-table {
  width: 100%; border-collapse: collapse;
  font-size: 0.78rem; font-family: 'JetBrains Mono', monospace;
}
.data-table th {
  background: rgba(124,58,237,0.15); color: var(--violet-light);
  padding: 0.5rem 0.75rem; text-align: left;
  border: 1px solid var(--border); font-size: 0.72rem;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.data-table td {
  padding: 0.4rem 0.75rem; border: 1px solid rgba(30,45,74,0.6);
  color: var(--text2); text-align: left;
}
.data-table tr:hover td { background: rgba(124,58,237,0.05); color: var(--text); }
.data-table td.null { color: var(--text3); font-style: italic; }
.data-table td.highlighted { background: rgba(124,58,237,0.15); color: var(--violet-light); }
.data-table td.result { background: rgba(16,185,129,0.08); color: var(--green); }

/* VISUALIZER */
.viz-container {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 1.25rem; margin-top: 1rem;
}
.viz-title {
  font-size: 0.75rem; font-family: 'JetBrains Mono', monospace;
  color: var(--cyan); text-transform: uppercase; letter-spacing: 0.1em;
  margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; direction: ltr;
}
.viz-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 1rem; align-items: start; }
.viz-arrow {
  display: flex; align-items: center; justify-content: center;
  color: var(--violet-light); font-size: 1.5rem; padding-top: 2rem;
}
.viz-label {
  font-size: 0.65rem; font-family: 'JetBrains Mono', monospace;
  color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 0.4rem; direction: ltr; text-align: left;
}

/* JOIN VISUALIZER */
.join-container { margin-top: 1rem; }
.join-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.25rem; direction: ltr; }
.join-tab {
  padding: 0.35rem 0.85rem; border-radius: 6px; font-size: 0.75rem;
  font-weight: 600; cursor: pointer; border: 1px solid var(--border);
  background: transparent; color: var(--text2); transition: all 0.15s;
  font-family: 'JetBrains Mono', monospace;
}
.join-tab:hover { border-color: var(--violet); color: var(--violet-light); }
.join-tab.active { background: var(--violet); border-color: var(--violet); color: white; }
.join-layout { display: grid; grid-template-columns: 1fr 200px 1fr; gap: 1rem; align-items: start; }
.venn-svg-wrap { display: flex; justify-content: center; padding-top: 0.5rem; }
.result-section { margin-top: 1.25rem; }
.result-label {
  font-size: 0.65rem; font-family: 'JetBrains Mono', monospace;
  color: var(--green); text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.4rem; direction: ltr;
}
.result-count {
  background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3);
  border-radius: 100px; padding: 0.1rem 0.5rem; font-size: 0.65rem; color: var(--green);
}

/* CONSTRAINT CARDS */
.constraint-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.75rem; margin-top: 0.75rem; }
.constraint-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 0.9rem;
  border-top: 3px solid transparent; transition: all 0.2s;
}
.constraint-card:hover { border-top-color: var(--violet); transform: translateY(-2px); }
.constraint-card h4 {
  font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
  font-weight: 700; margin-bottom: 0.4rem; color: var(--violet-light);
}
.constraint-card p { font-size: 0.75rem; color: var(--text2); line-height: 1.6; }

/* AGGREGATE VISUALIZER */
.agg-container { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 0.75rem; }
.agg-step {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 1rem;
}
.agg-step-title {
  font-size: 0.65rem; font-family: 'JetBrains Mono', monospace;
  color: var(--orange); text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 0.6rem;
}

/* GROUP VIZ */
.group-viz { margin-top: 0.75rem; direction: ltr; text-align: left; }
.group-item {
  border: 1px solid var(--border); border-radius: 8px;
  margin-bottom: 0.5rem; overflow: hidden;
}
.group-header {
  padding: 0.4rem 0.75rem; font-size: 0.75rem; font-family: 'JetBrains Mono', monospace;
  font-weight: 700; display: flex; align-items: center; justify-content: space-between;
}
.group-rows { padding: 0.25rem 0.5rem 0.5rem; }
.group-row {
  font-size: 0.72rem; font-family: 'JetBrains Mono', monospace;
  color: var(--text2); padding: 0.15rem 0.25rem;
}

/* STEP INDICATOR */
.steps { display: flex; gap: 0; margin: 1rem 0; }
.step {
  flex: 1; padding: 0.6rem 0.75rem;
  background: var(--bg2); border: 1px solid var(--border);
  font-size: 0.72rem; text-align: center; color: var(--text2);
  position: relative;
}
.step:first-child { border-radius: 8px 0 0 8px; }
.step:last-child { border-radius: 0 8px 8px 0; }
.step.active { background: rgba(124,58,237,0.15); color: var(--violet-light); border-color: var(--violet); }
.step-num {
  display: block; font-size: 0.6rem; color: var(--text3);
  font-family: 'JetBrains Mono', monospace; margin-bottom: 0.15rem;
}

/* BADGE */
.badge {
  display: inline-block; padding: 0.15rem 0.5rem;
  border-radius: 4px; font-size: 0.65rem;
  font-family: 'JetBrains Mono', monospace; font-weight: 600;
}
.badge-v { background: rgba(124,58,237,0.2); color: var(--violet-light); }
.badge-c { background: rgba(6,182,212,0.2); color: var(--cyan-light); }
.badge-g { background: rgba(16,185,129,0.2); color: var(--green); }
.badge-o { background: rgba(245,158,11,0.2); color: var(--orange); }
.badge-r { background: rgba(239,68,68,0.2); color: var(--red); }

/* TWO COLS */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 0.75rem; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; margin-top: 0.75rem; }

/* SEPARATOR */
.sep { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

/* HAMBURGER */
.hamburger {
  display: none; background: none; border: none; color: var(--text);
  font-size: 1.4rem; cursor: pointer; padding: 0.25rem;
}
@media (max-width: 768px) {
  .hamburger { display: block; }
  .sidebar { transform: translateX(100%); }
  .sidebar.open { transform: translateX(0); z-index: 999; }
  .main-content { margin-right: 0; }
  .join-layout { grid-template-columns: 1fr; }
  .viz-grid { grid-template-columns: 1fr; }
  .two-col, .three-col, .agg-container, .constraint-grid { grid-template-columns: 1fr; }
  .overlay { display: block; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 998; }
}
.overlay { display: none; }

/* EXEC ORDER */
.exec-flow { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin: 1rem 0; direction: ltr; }
.exec-step {
  padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.78rem;
  font-family: 'JetBrains Mono', monospace; font-weight: 600;
  border: 1px solid var(--border); background: var(--bg2); color: var(--text2);
  cursor: pointer; transition: all 0.2s; position: relative;
}
.exec-step:hover { border-color: var(--violet); color: var(--violet-light); }
.exec-step.active { background: var(--violet); border-color: var(--violet); color: white; box-shadow: 0 0 20px var(--glow-v); }
.exec-step .exec-num {
  position: absolute; top: -8px; right: -6px; width: 18px; height: 18px;
  border-radius: 50%; background: var(--cyan); color: var(--bg); font-size: 0.55rem;
  display: flex; align-items: center; justify-content: center;
}
.exec-arrow { color: var(--text3); font-size: 1rem; }

/* SET OP CARDS */
.set-op-grid { display: grid; grid-template-columns: 1fr auto 1fr auto 1fr; gap: 0.75rem; align-items: center; margin: 1rem 0; }
.set-op-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  padding: 0.75rem; text-align: center;
}
.set-op-symbol { font-size: 1.5rem; color: var(--violet-light); text-align: center; }

/* ANIMATIONS */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.animate-in { animation: fadeIn 0.3s ease; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
.pulse { animation: pulse 2s ease-in-out infinite; }

/* PROGRESS BAR */
.progress-bar { height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; margin: 0.5rem 0; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--violet), var(--cyan)); border-radius: 3px; transition: width 0.4s; }

/* SUBQUERY LAYERS */
.subquery-outer { border: 2px solid var(--violet); border-radius: 8px; padding: 0.75rem; position: relative; direction: ltr; text-align: left; }
.subquery-inner { border: 2px solid var(--cyan); border-radius: 6px; padding: 0.75rem; margin-top: 0.5rem; position: relative; }
.subquery-tag {
  position: absolute; top: -0.6rem; left: 0.75rem; direction: ltr;
  background: var(--bg); padding: 0 0.4rem;
  font-size: 0.6rem; font-family: 'JetBrains Mono', monospace;
}
.subquery-tag-v { color: var(--violet-light); }
.subquery-tag-c { color: var(--cyan-light); }

/* SCROLLSPY ACTIVE */
.nav-item.scrollspy-active {
  color: var(--cyan-light);
  border-right-color: var(--cyan);
  background: rgba(6,182,212,0.08);
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ===== HTML ESCAPE HELPER =====
function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ===== SQL SYNTAX HIGHLIGHTER (proper tokenizer - no cascade bugs) =====
function highlight(sql) {
  const KW = new Set([
    'SELECT','FROM','WHERE','INSERT','INTO','VALUES','UPDATE','SET','DELETE',
    'CREATE','TABLE','DATABASE','ALTER','DROP','ADD','COLUMN','CONSTRAINT',
    'REFERENCES','DEFAULT','UNIQUE','CHECK','TRUNCATE','INNER','LEFT','RIGHT',
    'FULL','OUTER','JOIN','ON','HAVING','ASC','DESC','DISTINCT','AS','AND',
    'OR','NOT','IN','BETWEEN','LIKE','EXISTS','EXCEPT','UNION','INTERSECT',
    'WITH','LIMIT','TOP','IDENTITY','CASCADE','COUNT','SUM','AVG','MIN','MAX',
    'VAR','STDEV','NULL','TRUE','FALSE','INT','INTEGER','VARCHAR','FLOAT',
    'CHAR','SMALLINT','BIGINT','DATE','DATETIME','TIMESTAMP','BOOLEAN',
    'MONEY','ANY','ALL','SOME','YEAR','MONTH','GETDATE','CURRENT_TIMESTAMP',
    'PRIMARY','FOREIGN','KEY','ORDER','GROUP','BY','IS','NVARCHAR','REAL',
    'TRUNCATE','VARBINARY','MONEY','BIT','DECIMAL','SMALLDATETIME','NCHAR',
    'ROLLBACK','COMMIT','BEGIN','TRANSACTION','INDEX','VIEW','PROCEDURE',
    'FUNCTION','TRIGGER','EXEC','EXECUTE','DROP','BACKUP','RESTORE',
  ]);
  const OPS = new Set(Array.from('=<>!,;()*[]+-/'));
  let out = '', i = 0;
  const n = sql.length;
  while (i < n) {
    const ch = sql[i];
    // -- single-line comment
    if (ch === '-' && sql[i+1] === '-') {
      let j = i;
      while (j < n && sql[j] !== '\n') j++;
      out += `<span class="cmt">${escHtml(sql.slice(i, j))}</span>`;
      i = j;
    }
    // string literal
    else if (ch === "'") {
      let j = i + 1;
      while (j < n && sql[j] !== "'") j++;
      out += `<span class="str">${escHtml(sql.slice(i, j + 1))}</span>`;
      i = j + 1;
    }
    // word → keyword or identifier
    else if (/[a-zA-Z_\u0600-\u06FF]/.test(ch)) {
      let j = i;
      while (j < n && /[\w\u0600-\u06FF]/.test(sql[j])) j++;
      const word = sql.slice(i, j);
      if (KW.has(word.toUpperCase())) {
        out += `<span class="kw">${escHtml(word.toUpperCase())}</span>`;
      } else {
        out += escHtml(word);
      }
      i = j;
    }
    // number
    else if (/\d/.test(ch)) {
      let j = i;
      while (j < n && /[\d.]/.test(sql[j])) j++;
      out += `<span class="num">${escHtml(sql.slice(i, j))}</span>`;
      i = j;
    }
    // operator chars
    else if (OPS.has(ch)) {
      out += `<span class="op">${escHtml(ch)}</span>`;
      i++;
    }
    // everything else: whitespace, newlines, Arabic, emoji...
    else {
      out += escHtml(ch);
      i++;
    }
  }
  return out;
}

function SQLBlock({ code, title }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    navigator.clipboard?.writeText(code).catch(() => {});
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };
  return (
    <div className="sql-block">
      <div className="sql-block-header">
        <div className="sql-block-dots">
          <div className="dot dot-r"/><div className="dot dot-y"/><div className="dot dot-g"/>
        </div>
        <span className="sql-block-label">{title || 'SQL'}</span>

// ===== INNER JOIN RESULT =====
const innerJoinResult = students
  .filter(s => registered.some(r => r[0] === s[0]))
  .flatMap(s => registered.filter(r => r[0] === s[0]).map(r => [s[0], s[1], r[1]]))
  .sort((a,b) => a[0] - b[0]);

// LEFT JOIN RESULT
const leftJoinResult = students.map(s => {
  const regs = registered.filter(r => r[0] === s[0]);
  if (regs.length === 0) return [[s[0], s[1], null]];
  return regs.map(r => [s[0], s[1], r[1]]);
}).flat();

// RIGHT JOIN (courses) result
const rightJoinResult = courses.flatMap(c => {
  const regs = registered.filter(r => r[1] === c[0]);
  if (regs.length === 0) return [[null, c[0], c[1]]];
  return regs.map(r => [r[0], c[0], c[1]]);
});

// CROSS JOIN (small sample)
const crossJoinResult = students.slice(0,3).flatMap(s => courses.slice(0,3).map(c => [s[0], s[1], c[0], c[1]]));

// FULL JOIN
const fullJoinResult = [
  ...leftJoinResult,
  ...rightJoinResult.filter(r => r[0] === null)
];

-- حذف قاعدة بيانات موجودة

        <div className="warn-box">⚠️ <strong>تحذير:</strong> الـ DROP DATABASE بتحذف كل حاجة جوّه قاعدة البيانات بدون رجعة! كن حذر جداً.</div>

          <strong>1.</strong> تحدد الـ data types للـ columns<br/>
          <strong>2.</strong> تحدد الـ columns اللي ممكن تكون NULL<br/>
          <strong>3.</strong> تحدد الـ columns اللي لازم تكون UNIQUE<br/>
          <strong>4.</strong> تحدد الـ Primary Key والـ Foreign Key<br/>
          <strong>5.</strong> تحدد الـ Default Values<br/>
          <strong>6.</strong> تضيف الـ Constraints<br/>
          <strong>7.</strong> تعمل الجدول!
        </div>
        <SQLBlock title="CREATE TABLE SYNTAX" code={`CREATE TABLE TableName
(
    ColumnName1  DataType  [Constraints],
    ColumnName2  DataType  [Constraints],
    ...
    [Table-Level Constraints]
);`}/>
        <SQLBlock title="EXAMPLE - Student Table" code={`CREATE TABLE Student
(
    SSN      INT         PRIMARY KEY,
    Name     VARCHAR(45) NOT NULL,
    Age      INT,
    City     VARCHAR(15) DEFAULT 'CAIRO',
    Major    VARCHAR(5)
);`}/>
        <SQLBlock title="EXAMPLE - Department with IDENTITY" code={`CREATE TABLE Department
(
    DeptId    INT IDENTITY(1,1) PRIMARY KEY,
    -- IDENTITY(start, increment): يبدأ من 1 ويزيد بـ 1
    -- يعني Auto-Increment مش هنحتاج نحط قيمة ليه
    Name      VARCHAR(15) NOT NULL
);`}/>
        <SQLBlock title="EXAMPLE - Registered Table with FK" code={`CREATE TABLE Registered
(
    SSN       INT          NOT NULL REFERENCES Student(SSN),
    CrsCode   SMALLINT     NOT NULL REFERENCES Course(CrsCode),
    Semester  VARCHAR(45)  NOT NULL,
    [Year]    VARCHAR(45)

);`}/>
      </div>

      {/* CONSTRAINTS */}
      <div className="topic-card" id="constraints">
        <div className="topic-title"><span className="icon">🔒</span> Constraints - القيود</div>

        <div className="constraint-grid">
          {[
            {name:'NOT NULL',color:'var(--red)',desc:'الـ Column دي مش ممكن تبقى فارغة. لازم دايماً يبقى فيها قيمة.',ex:'Name VARCHAR(45) NOT NULL'},
            {name:'DEFAULT',color:'var(--orange)',desc:'لو مدخلتش قيمة هيحط قيمة default تلقائياً.',ex:"City VARCHAR(15) DEFAULT 'CAIRO'"},
            {name:'UNIQUE',color:'var(--cyan)',desc:'كل القيم في الـ Column دي لازم تكون مختلفة، مفيش تكرار.',ex:'Name VARCHAR(45) UNIQUE'},
            {name:'PRIMARY KEY',color:'var(--violet)',desc:'NOT NULL + UNIQUE. بيعرّف كل row بشكل فريد. كل table عندها PK واحد بس.',ex:'SSN INT PRIMARY KEY'},
            {name:'FOREIGN KEY',color:'var(--pink)',desc:'بيربط جدولين مع بعض ويضمن Referential Integrity.',ex:'Major VARCHAR(5) REFERENCES Department(DCode)'},
            {name:'CHECK',color:'var(--green)',desc:'بيتأكد إن القيمة بتحقق شرط معين.',ex:'CHECK (Age >= 18)'},
          ].map(c => (

              <div style={{marginTop:'0.4rem',background:'rgba(0,0,0,0.3)',borderRadius:'4px',padding:'0.3rem 0.5rem',fontFamily:'JetBrains Mono',fontSize:'0.65rem',color:'var(--text2)'}}>{c.ex}</div>
            </div>
          ))}
        </div>
        <SQLBlock title="CHECK + UNIQUE + FK Example" code={`CREATE TABLE Student
(
    SSN      INT NOT NULL,
    Name     VARCHAR(45),
    Age      INT,
    City     VARCHAR(15) DEFAULT 'CAIRO',
    Major    VARCHAR(5),
    -- Table-level constraints:
    CONSTRAINT CHK_Age    CHECK (Age >= 18 AND City = 'Sandnes'),
    CONSTRAINT UC_Name    UNIQUE (Name)
);`}/>
        <SQLBlock title="FOREIGN KEY with Actions" code={`ALTER TABLE Student
ADD CONSTRAINT FK_1
    FOREIGN KEY (Major)
    REFERENCES Department(DeptCode)
    ON DELETE SET NULL   -- لو المرجع اتحذف اعمله NULL
    ON UPDATE CASCADE;   -- لو المرجع اتغير اغيّر معاه`}/>
        <div className="two-col">
          <div className="note-box">🔑 <strong>ON DELETE SET NULL:</strong> لو الـ Department اتحذفت، الـ Major هيبقى NULL بدل ما نحذف الـ Student.</div>
          <div className="note-box">⛓️ <strong>ON UPDATE CASCADE:</strong> لو رقم الـ Department اتغير، الـ Major في Student هيتغير تلقائياً.</div>
        </div>
      </div>

      {/* ALTER TABLE */}
      <div className="topic-card" id="alter-table">
        <div className="topic-title"><span className="icon">🔧</span> ALTER TABLE - تعديل جدول موجود</div>
        <div className="topic-body">
          الـ <strong>ALTER TABLE</strong> بيخلينا نغير في هيكل الجدول بعد ما اتعمل. فيها عمليات كتير:
        </div>
        <SQLBlock title="ADD COLUMN" code={`-- إضافة column جديدة
ALTER TABLE Department
ADD numberOfStudents INT;

-- إضافة أكتر من column
ALTER TABLE Employee
ADD Phone VARCHAR(20), Email VARCHAR(100);`}/>
        <SQLBlock title="DROP COLUMN" code={`-- حذف column
ALTER TABLE Student
DROP COLUMN Major;`}/>
        <SQLBlock title="ALTER COLUMN - تغيير نوع البيانات" code={`-- تغيير الـ data type
ALTER TABLE Student
ALTER COLUMN Name VARCHAR(100); -- كانت 45 دلوقتي 100`}/>
        <SQLBlock title="ADD / DROP PRIMARY KEY" code={`-- إضافة Primary Key
ALTER TABLE Registered
ADD PRIMARY KEY (SSN, CrsCode);
-- أو بـ constraint name
ALTER TABLE Registered
ADD CONSTRAINT PK1 PRIMARY KEY (SSN, CrsCode);
-- Constraint Name بيكون Unique في الـ Database كلها`}/>
        <SQLBlock title="ADD / DROP FOREIGN KEY" code={`-- إضافة Foreign Key
ALTER TABLE Student
ADD CONSTRAINT FK_StudentDept
    FOREIGN KEY (DeptId)
    REFERENCES Department(DeptId);`}/>
        <SQLBlock title="ADD / DROP UNIQUE & CHECK" code={`-- إضافة UNIQUE Constraint
ALTER TABLE STUDENT
ADD CONSTRAINT UQ_Std_Name UNIQUE (Name);

-- حذف Constraint
ALTER TABLE STUDENT
DROP CONSTRAINT UQ_Std_Name;

-- إضافة CHECK Constraint
ALTER TABLE DEPARTMENT
ADD CONSTRAINT CK_DEPTCODE
    CHECK (DEPTCODE IN ('IS','CS','IT','DS'));

-- DROP DEFAULT
ALTER TABLE Persons
ALTER COLUMN City DROP DEFAULT;`}/>
        <div className="note-box">💡 <strong>تذكر:</strong> الـ Constraint Name لازم يكون unique في الـ Database كلها مش بس في الجدول!</div>
      </div>

      {/* DROP TABLE */}
      <div className="topic-card" id="drop-table">
        <div className="topic-title"><span className="icon">🗑️</span> DROP TABLE - حذف جدول</div>
        <div className="topic-body">الـ DROP TABLE بتحذف الجدول كله مع كل الداتا اللي جوّه:</div>
        <SQLBlock title="DROP TABLE" code={`-- حذف جدول كامل
DROP TABLE Student;

-- حذف الداتا بس وتفضل الـ constraints والـ structure
TRUNCATE TABLE Student;
-- TRUNCATE أسرع من DELETE * لأنه مش بيسجل كل row`}/>
        <div className="warn-box">⚠️ <strong>تحذير خطير:</strong> DROP TABLE لا رجعة فيها! الداتا كلها بتتحذف. دايماً اعمل Backup الأول!</div>
      </div>

      {/* University Schema */}
      <div className="topic-card" id="uni-schema">
        <div className="topic-title"><span className="icon">🎓</span> University Database Schema</div>
        <div className="topic-body">هنستخدم الـ Schema دي في كل الأمثلة الجاية:</div>
        <SQLBlock title="FULL UNIVERSITY SCHEMA" code={`-- University Database Schema

CREATE TABLE Department
(
    DeptId    INT IDENTITY(1,1) PRIMARY KEY,
    DeptCode  VARCHAR(5)  NOT NULL UNIQUE,
    Name      VARCHAR(50) NOT NULL
);

CREATE TABLE Student
(
    SSN    INT         PRIMARY KEY,
    Name   VARCHAR(45) NOT NULL,
    City   VARCHAR(20) DEFAULT 'Cairo',
    Age    INT,
    Major  VARCHAR(5)  REFERENCES Department(DeptCode)
);

CREATE TABLE Course
(
    CrsCode  SMALLINT     PRIMARY KEY,
    Name     VARCHAR(45)  UNIQUE NOT NULL
);

CREATE TABLE Registered
(
    SSN       INT       NOT NULL REFERENCES Student(SSN),
    CrsCode   SMALLINT  NOT NULL REFERENCES Course(CrsCode),
    Semester  VARCHAR(10) NOT NULL,
    [Year]    INT,
    CONSTRAINT PK_Reg PRIMARY KEY (SSN, CrsCode)
);`}/>
        <div className="two-col">
          <DataTable headers={['SSN','Name','City','Age','Major']} rows={students} title="📋 Student Table"/>
          <DataTable headers={['SSN','CrsCode','Semester','Year']} rows={registered} title="📋 Registered Table"/>
        </div>
      </div>
    </div>
  );
}

// ===== DML1 SECTION =====
function DML1Section() {
  const [whereDemo, setWhereDemo] = useState('AND');
  const filterResults = {
    AND: students.filter(s => s[2]==='Cairo' && s[3]>=18),
    OR: students.filter(s => s[2]==='Cairo' || s[3]>=18),
    BETWEEN: students.filter(s => s[3]>=17 && s[3]<=19),
    LIKE_perc: students.filter(s => s[1].toLowerCase().startsWith('a') || s[1].toLowerCase().includes('a')),
    IN: students.filter(s => ['Cairo','Giza'].includes(s[2])),
    IS_NULL: students.filter(s => s[4]===null),
    NOT_NULL: students.filter(s => s[4]!==null),
  };
  return (
    <div className="animate-in">
      <div className="section-hero">
        <div className="section-badge">LECTURES 4-5 • DML PART 1</div>
        <h1>✏️ Data Manipulation Language</h1>
        <p>هنا هنتعلم إزاي نتعامل مع الداتا! INSERT بيضيف، UPDATE بيعدل، DELETE بيحذف، وSELECT بيجيب الداتا. دي الأوامر اللي هتستخدمها كل يوم!</p>
      </div>

      {/* INSERT */}
      <div className="topic-card" id="insert">
        <div className="topic-title"><span className="icon">➕</span> INSERT INTO - إضافة بيانات</div>
        <div className="topic-body">الـ INSERT بيضيف rows جديدة في الجدول. فيه طريقتين:</div>
        <SQLBlock title="INSERT - كل الـ Columns" code={`-- لو بتحط قيمة في كل column بالترتيب
INSERT INTO Student
VALUES (201, 'Adam', 'Cairo', 21, 'IT');

-- لو الجدول فيه Identity Column مش بنحط قيمة ليها
INSERT INTO Department
VALUES ('IS', 'Information Systems');
-- DeptId هيتعبا تلقائياً`}/>
        <SQLBlock title="INSERT - Specific Columns" code={`-- لو بتحط قيمة في columns معينة بس
INSERT INTO Student (SSN, Name, City)
VALUES (202, 'Sara', 'Giza');
-- Age و Major هيبقوا NULL

-- Insert Multiple Rows
INSERT INTO Student (SSN, Name, City, Age, Major)
VALUES (203, 'Ali',   'Cairo', 20, 'CS'),
       (204, 'Nour',  'Giza',  22, 'IT'),
       (205, 'Laila', 'Cairo', 19, 'IS');`}/>
        <SQLBlock title="INSERT FROM Another Table" code={`-- نسخ بيانات من جدول لجدول تاني
INSERT INTO MyCustomers
SELECT customerNumber, customerName, city
FROM Customers;
-- لازم الـ Columns تتطابق في الترتيب والنوع!

-- مع WHERE
INSERT INTO MyStudents
SELECT *
FROM Student
WHERE City = 'Cairo';`}/>
        <div className="warn-box">⚠️ <strong>ملاحظات مهمة:</strong> الـ Primary Key مش ممكن يتكرر ولا يبقى فاضي. الـ Data Type لازم يتطابق. الـ NOT NULL columns لازم يبقى فيها قيمة.</div>
      </div>

      {/* UPDATE */}
      <div className="topic-card" id="update">
        <div className="topic-title"><span className="icon">✏️</span> UPDATE - تعديل بيانات</div>
        <div className="topic-body">الـ UPDATE بيغير قيم في rows موجودة:</div>
        <SQLBlock title="UPDATE SYNTAX" code={`UPDATE TableName
SET Column1 = Value1,
    Column2 = Value2
WHERE <Condition>;

-- لو مكتبتش WHERE هيعدل كل الـ Rows!`}/>
        <SQLBlock title="UPDATE Examples" code={`-- زيادة GPA كل الطلاب بنسبة 5%
UPDATE Student
SET GPA = GPA * 1.05;

-- تغيير GPA طالب معين
UPDATE Student
SET GPA = 3.6
WHERE Name = 'Ayman';

-- تغيير أكتر من قيمة في نفس الوقت
UPDATE Student
SET City = 'Giza', Major = 'IT'
WHERE SSN = 109;

-- تغيير Course Registration لطالبة
UPDATE Registered
SET CrsCode = 'IS312'
WHERE SSN = 110 AND CrsCode = 'IS221';`}/>
        <div className="warn-box">⚠️ <strong>تحذير:</strong> نسيت تكتب WHERE؟ هتعدل كل الـ rows في الجدول! دي غلطة كلاسيكية وممكن تتسبب في كارثة على Production.</div>
      </div>

      {/* DELETE */}
      <div className="topic-card" id="delete">
        <div className="topic-title"><span className="icon">🗑️</span> DELETE - حذف بيانات</div>
        <div className="topic-body">الـ DELETE بيحذف rows من الجدول:</div>
        <SQLBlock title="DELETE SYNTAX" code={`-- حذف rows معينة
DELETE FROM TableName
WHERE <Condition>;

-- حذف كل الـ Rows (الجدول بيفضل موجود)
DELETE FROM TableName;

-- حذف الجدول نفسه
DROP TABLE TableName;`}/>
        <SQLBlock title="DELETE Examples" code={`-- مسح Registration طالب من Course معين
DELETE FROM Registered
WHERE SSN = 101 AND CrsCode = 'IS312';

-- مسح كل الـ Registrations (خطر!)
DELETE FROM Registered;
-- لا تعمل كده على Real Data!

-- حذف الطلاب الصغار
DELETE FROM Student
WHERE Age < 18;`}/>
        <div className="note-box">💡 <strong>الفرق بين DELETE و TRUNCATE:</strong> DELETE بتحذف row by row وبتعمل log. TRUNCATE بتحذف كل حاجة دفعة واحدة وأسرع بكتير. لكن TRUNCATE مش ممكن تعمل Rollback في بعض الأحيان.</div>
      </div>

      {/* SELECT */}
      <div className="topic-card" id="select">
        <div className="topic-title"><span className="icon">🔍</span> SELECT - استعلام البيانات</div>
        <div className="topic-body">الـ SELECT هو القلب اللي هتستخدمه 80% من الوقت. بيجيب بيانات من الجداول:</div>
        <SQLBlock title="SELECT SYNTAX" code={`SELECT select_list
FROM table_name
WHERE conditions
ORDER BY column [ASC|DESC]
LIMIT N; -- MySQL
-- أو TOP(N) في SQL Server`}/>
        <SQLBlock title="SELECT Examples" code={`-- كل البيانات
SELECT * FROM Department;

-- Columns معينة
SELECT Name, Major FROM Student;

-- بدون تكرار - DISTINCT
SELECT DISTINCT CrsCode FROM Registered;

-- Alias - اسم مستعار
SELECT Name, Age * 12 AS AgeInMonths FROM Student;

-- كل الطلاب المسجلين في IS221 بين 2009 و 2011
SELECT SSN
FROM Registered
WHERE CrsCode = 'IS221'
  AND Year BETWEEN 2009 AND 2011;

-- TOP 5 طلاب
SELECT TOP(5) * FROM Student;
-- MySQL:
SELECT * FROM Student LIMIT 5;`}/>
        <DataTable headers={['SSN','Name','City','Age','Major']} rows={students} title="📋 Student Table - الداتا الأساسية"/>
      </div>

      {/* WHERE Operators */}
      <div className="topic-card" id="where">
        <div className="topic-title"><span className="icon">🎯</span> WHERE Clause - شروط الاستعلام</div>
        <div className="topic-body">الـ WHERE بيفلتر النتائج حسب شروط. فيه operators كتير:</div>

        {/* Interactive WHERE Demo */}
        <div className="viz-container">
          <div className="viz-title">⚡ Interactive WHERE Demo</div>
          <div className="join-tabs">
            {[['AND','AND','var(--violet)'],['OR','OR','var(--cyan)'],['BETWEEN','BETWEEN','var(--green)'],['IN','IN','var(--orange)'],['IS_NULL','IS NULL','var(--pink)']].map(([k,l,c]) => (
              <button key={k} className={`join-tab ${whereDemo===k?'active':''}`}
                style={whereDemo===k?{background:c,borderColor:c}:{}}
                onClick={() => setWhereDemo(k)}>{l}</button>
            ))}
          </div>
          {whereDemo === 'AND' && <>
            <SQLBlock code={`SELECT * FROM Student\nWHERE City = 'Cairo' AND Age >= 18;\n-- الاتنين الشرطين لازم يتحققوا`}/>
            <DataTable headers={['SSN','Name','City','Age','Major']} rows={filterResults.AND} title={`✅ النتيجة (${filterResults.AND.length} rows)`} resultRows={filterResults.AND.map((_,i)=>i)}/>
          </>}
          {whereDemo === 'OR' && <>
            <SQLBlock code={`SELECT * FROM Student\nWHERE City = 'Cairo' OR Age >= 18;\n-- واحد من الشرطين يكفي`}/>
            <DataTable headers={['SSN','Name','City','Age','Major']} rows={filterResults.OR} title={`✅ النتيجة (${filterResults.OR.length} rows)`} resultRows={filterResults.OR.map((_,i)=>i)}/>
          </>}
          {whereDemo === 'BETWEEN' && <>
            <SQLBlock code={`SELECT * FROM Student\nWHERE Age BETWEEN 17 AND 19;\n-- يشمل الحدود (17 و 19 مشمولين)`}/>
            <DataTable headers={['SSN','Name','City','Age','Major']} rows={filterResults.BETWEEN} title={`✅ النتيجة (${filterResults.BETWEEN.length} rows)`} resultRows={filterResults.BETWEEN.map((_,i)=>i)}/>
          </>}
          {whereDemo === 'IN' && <>
            <SQLBlock code={`SELECT * FROM Student\nWHERE City IN ('Cairo', 'Giza');\n-- بديل أحسن من:\n-- WHERE City = 'Cairo' OR City = 'Giza'`}/>
            <DataTable headers={['SSN','Name','City','Age','Major']} rows={filterResults.IN} title={`✅ النتيجة (${filterResults.IN.length} rows)`} resultRows={filterResults.IN.map((_,i)=>i)}/>
          </>}
          {whereDemo === 'IS_NULL' && <>
            <SQLBlock code={`-- الطلاب اللي Major بتاعهم فاضي
SELECT * FROM Student WHERE Major IS NULL;

-- الطلاب اللي عندهم Major
SELECT * FROM Student WHERE Major IS NOT NULL;

-- مش ممكن تكتب: WHERE Major = NULL (غلط!)`}/>
            <div className="two-col">
              <DataTable headers={['SSN','Name','City','Age','Major']} rows={filterResults.IS_NULL} title={`IS NULL (${filterResults.IS_NULL.length} rows)`} resultRows={filterResults.IS_NULL.map((_,i)=>i)}/>
              <DataTable headers={['SSN','Name','City','Age','Major']} rows={filterResults.NOT_NULL} title={`IS NOT NULL (${filterResults.NOT_NULL.length} rows)`} resultRows={filterResults.NOT_NULL.map((_,i)=>i)}/>
            </div>
          </>}
        </div>

        {/* LIKE */}
        <SQLBlock title="LIKE Operator - Pattern Matching" code={`-- % = أي عدد من الحروف (صفر أو أكتر)
-- _ = حرف واحد بالظبط

-- بيبدأ بـ 'Data'
SELECT Name FROM Course WHERE Name LIKE 'Data%';

-- بيخلص بـ 's'
SELECT Name FROM Course WHERE Name LIKE '%s';

-- بيحتوي على كلمة 'Data' في أي مكان
SELECT Name FROM Course WHERE Name LIKE '%Data%';

-- الحرف التاني 'r'
SELECT lastName FROM employees WHERE lastName LIKE '_r%';

-- الاسم الأخير بينتهي بـ 'son'
SELECT firstName, lastName
FROM employees
WHERE lastName LIKE '%son'
ORDER BY firstName;`}/>

        <SQLBlock title="ORDER BY + Equations" code={`-- ترتيب تصاعدي (default)
SELECT Name, Age FROM Student ORDER BY Age;

-- ترتيب تنازلي
SELECT Name, Age FROM Student ORDER BY Age DESC;

-- ترتيب بأكتر من column
SELECT Name, City, Age FROM Student
ORDER BY City ASC, Age DESC;

-- استخدام Alias في ORDER BY
SELECT orderNumber, orderLineNumber,
       quantityOrdered * priceEach AS subtotal
FROM orderdetails
ORDER BY subtotal DESC;`}/>
        <SQLBlock title="Comparison Operators" code={`-- مقارنة
SELECT * FROM employees WHERE jobTitle <> 'Sales Rep';
-- <> يعني "مش يساوي"

-- AND + OR معاً
SELECT lastName, firstName, jobTitle, officeCode
FROM employees
WHERE jobTitle = 'Sales Rep'
   OR officeCode = 1

}

      {/* EXISTS / NOT EXISTS */}
      <div className="topic-card" id="exists">
        <div className="topic-title"><span className="icon">✅</span> EXISTS & NOT EXISTS</div>
        <div className="topic-body">
          الـ <strong>EXISTS</strong> بيشوف لو الـ Subquery رجعت أي row على الأقل. مش مهم الـ values، المهم في rows ولا لأ!
        </div>
        <div className="two-col">
          <div className="constraint-card" style={{borderTopColor:'var(--green)'}}>
            <h4 style={{color:'var(--green)'}}>EXISTS</h4>
            <p>✅ TRUE: لو الـ Subquery رجعت row واحدة على الأقل<br/>❌ FALSE: لو مرجعتش أي rows</p>
          </div>
          <div className="constraint-card" style={{borderTopColor:'var(--red)'}}>
            <h4 style={{color:'var(--red)'}}>NOT EXISTS</h4>
            <p>✅ TRUE: لو الـ Subquery مرجعتش أي rows<br/>❌ FALSE: لو رجعت row واحدة على الأقل</p>
          </div>
        </div>
        <SQLBlock title="EXISTS Example" code={`-- Customers اللي عملوا Orders في آخر 15 يوم
SELECT Customers.CompanyName
FROM Customers
WHERE EXISTS (
    SELECT Orders.OrderID
    FROM Orders
    WHERE Orders.CustomerID = Customers.CustomerID
      AND Orders.OrderDate > GETDATE() - 15
);
-- GETDATE() = Current Date في SQL Server
-- CURRENT_TIMESTAMP = نفسها في MySQL`}/>
        <SQLBlock title="NOT EXISTS Example" code={`-- Customers اللي ما عملوش أي Orders في آخر 15 يوم
SELECT Customers.CompanyName
FROM Customers
WHERE NOT EXISTS (
    SELECT Orders.OrderID
    FROM Orders
    WHERE Orders.CustomerID = Customers.CustomerID
      AND Orders.OrderDate > CURRENT_TIMESTAMP - 15
);`}/>
        <div className="note-box">💡 <strong>EXISTS vs IN:</strong> EXISTS بيوقف فور ما يلاقي row واحدة (أسرع). IN بيجمع كل النتائج الأول. في الغالب EXISTS أسرع مع subqueries كبيرة.</div>
      </div>

      {/* DIVIDE OPERATOR */}
      <div className="topic-card" id="divide">
        <div className="topic-title"><span className="icon">➗</span> Divide Set Operator - قسمة المجموعات</div>
        <div className="topic-body">
          الـ Divide Operator بيجاوب على سؤال من نوع "<strong>مين عنده كل...</strong>". مثلاً: مين اشترى كل المنتجات اللي اشتراها Customer معين؟
        </div>
        <SQLBlock title="Divide - طريقة NOT IN" code={`-- Get Customers who ordered ALL products that 'CENTC' ordered

SELECT DISTINCT customerid
FROM orders r
WHERE NOT EXISTS (
    -- جيب كل products اشتراها CENTC
    SELECT *
    FROM orders o, [Order Details] od1
    WHERE od1.OrderID = o.OrderID
      AND customerid = 'CENTC'
      AND od1.ProductID NOT IN (
          -- اللي Customer ده اشتراه
          SELECT ProductID
          FROM [order details] od2, orders o2
          WHERE od2.orderid = o2.orderId
            AND r.customerid = o2.customerid
      )
);
-- المعنى: مفيش product اشتراها CENTC ومشتراهاش الـ Customer ده`}/>
        <SQLBlock title="Divide - طريقة EXCEPT (أوضح)" code={`-- نفس النتيجة بـ EXCEPT
SELECT DISTINCT customerid
FROM orders r
WHERE NOT EXISTS (
    -- Products بتاعة CENTC
    SELECT ProductID
    FROM orders o, [Order Details] od1
    WHERE od1.OrderID = o.OrderID
      AND customerid = 'CENTC'

    EXCEPT -- طرح

    -- Products بتاعة Customer الحالي
    SELECT ProductID
    FROM [order details] od2, orders o2
    WHERE od2.orderid = o2.orderId
      AND r.customerid = o2.customerid
);
-- لو الـ EXCEPT طلعت فاضية (Phi) ← NOT EXISTS = TRUE ← اتضاف`}/>
        <SQLBlock title="Divide - طريقة أوضح مع Customers Table" code={`-- الأكثر optimization
SELECT CustomerId
FROM Customers CC
WHERE NOT EXISTS (
    SELECT DISTINCT P.ProductId
    FROM Products P, Customers C, Orders O, [Order Details] OD
    WHERE P.ProductID = OD.ProductID
      AND O.OrderID = OD.OrderID
      AND C.CustomerID = O.CustomerID
      AND C.customerid = 'CENTC'

    EXCEPT

    SELECT DISTINCT P.ProductId
    FROM Products P, Customers C, Orders O, [Order Details] OD
    WHERE P.ProductID = OD.ProductID
      AND O.OrderID = OD.OrderID
      AND C.CustomerID = O.CustomerID
      AND C.customerid = CC.customerid
);
-- أحسن لأن مش محتاج DISTINCT في الـ outer query`}/>
        <SQLBlock title="Divide - بـ EXISTS (طريقة تانية)" code={`-- نفس النتيجة بـ EXISTS بدل NOT EXISTS
SELECT CustomerId FROM Customers
EXCEPT
SELECT CustomerId FROM Customers CC
WHERE EXISTS (
    SELECT DISTINCT P.ProductId
    FROM Products P, Customers C, Orders O, [Order Details] OD
    WHERE P.ProductID = OD.ProductID
      AND O.OrderID = OD.OrderID
      AND C.CustomerID = O.CustomerID
      AND C.customerid = 'CENTC'

    EXCEPT

    SELECT DISTINCT P.ProductId
    FROM Products P, Customers C, Orders O, [Order Details] OD
    WHERE P.ProductID = OD.ProductID
      AND O.OrderID = OD.OrderID
      AND C.CustomerID = O.CustomerID
      AND C.customerid = CC.customerid
);`}/>
      </div>

      {/* SET OPERATORS */}
      <div className="topic-card" id="set-operators">
        <div className="topic-title"><span className="icon">🔄</span> Set Operators - عمليات المجموعات</div>
        <div className="topic-body">
          الـ Set Operators بتجمع نتائج أكتر من query مع بعض. الشرط الأساسي: لازم الـ <strong>columns تتطابق في العدد والنوع</strong>.
        </div>
        <div className="constraint-grid">
          {[
            {name:'UNION',color:'var(--violet)',desc:'بيدمج نتائج query-تين وبيشيل التكرار.'},
            {name:'UNION ALL',color:'var(--violet-light)',desc:'بيدمج نتائج query-تين وبيسيب التكرار (أسرع!).'},
            {name:'INTERSECT',color:'var(--cyan)',desc:'بيرجع بس الـ rows الموجودة في الاتنين.'},
            {name:'EXCEPT',color:'var(--orange)',desc:'بيرجع الـ rows من الأولى اللي مش موجودة في التانية.'},
          ].map(op => (
            <div key={op.name} className="constraint-card" style={{borderTopColor:op.color}}>
              <h4 style={{color:op.color,fontFamily:'JetBrains Mono'}}>{op.name}</h4>
              <p>{op.desc}</p>
            </div>
          ))}
        </div>
        <SQLBlock title="UNION / UNION ALL" code={`-- UNION: دمج بدون تكرار
SELECT Name FROM Student
UNION
SELECT Name FROM Employee;
-- لو Ahmed موجود في الاتنين هيظهر مرة واحدة بس

-- UNION ALL: دمج مع تكرار (أسرع)
SELECT Name FROM Student
UNION ALL
SELECT Name FROM Employee;
-- لو Ahmed موجود في الاتنين هيظهر مرتين

-- الشرط: نفس عدد الـ columns ونفس الأنواع!`}/>
        <SQLBlock title="INTERSECT / EXCEPT" code={`-- INTERSECT: الموجود في الاتنين بس
SELECT City FROM Student
INTERSECT
SELECT City FROM Employee;
-- المدن المشتركة بين الطلاب والموظفين

-- EXCEPT: الموجود في الأولى بس
SELECT City FROM Student
EXCEPT
SELECT City FROM Employee;
-- المدن اللي فيها طلاب بس ومفيش فيها موظفين

-- ممكن نستخدم EXCEPT للتحقق من تكافؤ Queries:
-- Q1 EXCEPT Q2 → لو فاضية
-- Q2 EXCEPT Q1 → لو فاضية
-- = الـ Queries متكافئة!`}/>
      </div>

      {/* ANY / ALL */}
      <div className="topic-card" id="any-all">
        <div className="topic-title"><span className="icon">⚖️</span> ANY / ALL Operators</div>
        <div className="topic-body">
          الـ <strong>ANY</strong> و <strong>ALL</strong> بيشتغلوا مع Subqueries وبيقارنوا قيمة مع مجموعة قيم:
        </div>
        <div className="two-col">
          <div className="constraint-card" style={{borderTopColor:'var(--cyan)'}}>
            <h4 style={{color:'var(--cyan)'}}>ANY / SOME</h4>
            <p>TRUE لو الشرط اتحقق مع <strong>أي قيمة واحدة</strong> على الأقل في الـ Subquery. يعني: أكبر من أصغر واحد.</p>
          </div>
          <div className="constraint-card" style={{borderTopColor:'var(--orange)'}}>
            <h4 style={{color:'var(--orange)'}}>ALL</h4>
            <p>TRUE لو الشرط اتحقق مع <strong>كل القيم</strong> في الـ Subquery. يعني: أكبر من أكبر واحد.</p>
          </div>
        </div>
        <SQLBlock title="ANY / ALL Examples" code={`-- ALL: الطلاب اللي GPA بتاعهم أعلى من كل طلاب القاهرة
SELECT Name
FROM Student
WHERE GPA > ALL (
    SELECT GPA
    FROM Student
    WHERE City = 'Cairo'
);
-- يعني GPA أكبر من أعلى GPA في القاهرة

-- ANY: الطلاب اللي GPA بتاعهم أعلى من أي طالب في القاهرة
SELECT Name
FROM Student
WHERE GPA > ANY (
    SELECT GPA
    FROM Student
    WHERE City = 'Cairo'
);
-- يعني GPA أكبر من أقل GPA في القاهرة`}/>
      </div>

      {/* EXECUTION ORDER */}
      <div className="topic-card" id="exec-order">
        <div className="topic-title"><span className="icon">🔄</span> SQL Execution Order - ترتيب التنفيذ</div>
        <div className="topic-body">
          <strong>مهم جداً!</strong> الـ SQL مش بيتنفذ بالترتيب اللي بنكتبه! اضغط على أي step عشان تفهم:
        </div>
        <ExecutionOrderViz/>
      </div>

      {/* NESTED SUBQUERY IN SELECT */}
      <div className="topic-card" id="nested-select">
        <div className="topic-title"><span className="icon">🪆</span> Nested Subquery في SELECT Clause</div>
        <div className="topic-body">
          ممكن نحط Subquery في الـ SELECT clause نفسها بدل ما نعمل JOIN:
        </div>
        <SQLBlock title="Subquery in SELECT" code={`-- طريقة 1: Subquery في SELECT (بدون JOIN)
SELECT OrderId,
       CustomerId,
       (SELECT ContactName
        FROM Customers C
        WHERE C.CustomerID = O.CustomerID) AS CustomerName
FROM Orders O;

-- طريقة 2: نفس النتيجة بـ JOIN
SELECT OrderId, C.CustomerId, ContactName
FROM Customers C, Orders
WHERE C.CustomerID = Orders.CustomerID;

-- إزاي نتأكد إن الاتنين بيرجعوا نفس النتيجة؟
-- Run Q1 EXCEPT Q2 → لازم ترجع فاضية (Phi)
-- Run Q2 EXCEPT Q1 → لازم ترجع فاضية (Phi)
-- لو الاتنين فاضيين → الـ Queries متكافئة!

-- أو أذكى:
-- Q1 UNION Q2 = Q1 INTERSECT Q2 → متكافئين`}/>
      </div>

      {/* CTE - WITH */}
      <div className="topic-card" id="cte">
        <div className="topic-title"><span className="icon">📦</span> WITH Clause - Common Table Expression (CTE)</div>
        <div className="topic-body">
          الـ <strong>WITH</strong> بيعمل جدول مؤقت وبيديه اسم، وبعدين نقدر نستخدمه في الـ Query الأساسية كأنه جدول حقيقي. بيخلي الـ Code أوضح وأسهل.
        </div>
        <SQLBlock title="WITH (CTE) Syntax & Example" code={`-- Syntax
WITH CTE_Name AS
(
    SELECT Statement
)
SELECT ...
FROM TableOne T, CTE_Name
WHERE CTE_Name.Id = T.Id;

-- مثال حقيقي: CTE بيجمع Orders لكل Customer
WITH CustomerOrders AS
(
    SELECT CustomerID,
           COUNT(*) AS TotalOrders,
           SUM(TotalAmount) AS TotalSpent
    FROM Orders
    GROUP BY CustomerID
)
SELECT C.CompanyName,
       CO.TotalOrders,
       CO.TotalSpent
FROM Customers C
INNER JOIN CustomerOrders CO
    ON C.CustomerID = CO.CustomerID
WHERE CO.TotalOrders > 5
ORDER BY CO.TotalSpent DESC;`}/>

        <div className="note-box">
          💡 <strong>فايدة الـ CTE:</strong><br/>
          ✅ بيخلي الـ Query أوضح وأسهل في القراءة<br/>
          ✅ ممكن تستخدم نفس الـ CTE أكتر من مرة في نفس الـ Query<br/>
          ✅ أحسن من الـ Subqueries المتداخلة الصعبة<br/>
          ✅ ممكن تعمل Recursive Queries بيها
        </div>

        {/* Subquery as Table */}
        <SQLBlock title="Subquery كـ Derived Table" code={`-- Subquery كجدول مؤقت في FROM
SELECT C.ContactName, O.OrderDate
FROM
    (SELECT ContactName, CustomerID, COUNTRY
     FROM Customers
     WHERE COUNTRY = 'USA') AS C,
    (SELECT CustomerID, OrderDate
     FROM Orders
     WHERE YEAR(OrderDate) = 1996
       AND MONTH(OrderDate) = 12) AS O
WHERE C.CustomerID = O.CustomerId;

-- نفس النتيجة بـ JOINs
SELECT C.ContactName, O.OrderDate
FROM Customers C
INNER JOIN Orders O ON C.CustomerID = O.CustomerID
WHERE Country = 'USA'
  AND YEAR(O.OrderDate) = 1996
  AND MONTH(O.OrderDate) = 12;

-- Customers اللي اشتروا Products مش مكررة
SELECT Products.ProductID, Products.ProductName,
       Count(Q.CustomerID) AS NumberOfCustomers
FROM (
    SELECT DISTINCT ProductID, CustomerID
    FROM Orders
    INNER JOIN [Order Details]
    ON Orders.OrderID = [Order Details].OrderID
) AS Q
INNER JOIN Products ON Q.ProductID = Products.ProductID
GROUP BY Products.ProductID, Products.ProductName
ORDER BY ProductId;`}/>
      </div>

      {/* Summary Cheatsheet */}
      <div className="topic-card" id="cheatsheet">
        <div className="topic-title"><span className="icon">📝</span> SQL Cheatsheet - مراجعة سريعة</div>
        <div className="constraint-grid">
          {[
            {name:'SELECT *',desc:'جيب كل الـ columns',cat:'SELECT'},
            {name:'WHERE x = y',desc:'فلتر بشرط',cat:'FILTER'},
            {name:'ORDER BY col DESC',desc:'رتب تنازلياً',cat:'SORT'},
            {name:'DISTINCT',desc:'شيل التكرار',cat:'SELECT'},
            {name:'BETWEEN x AND y',desc:'نطاق (شامل الحدود)',cat:'FILTER'},
            {name:'LIKE \'%x%\'',desc:'بيحتوي على x',cat:'FILTER'},
            {name:'IN (a,b,c)',desc:'موجود في القائمة',cat:'FILTER'},
            {name:'IS NULL',desc:'القيمة فارغة',cat:'FILTER'},
            {name:'INNER JOIN',desc:'التطابق بس',cat:'JOIN'},
            {name:'LEFT JOIN',desc:'كل الشمال',cat:'JOIN'},
            {name:'RIGHT JOIN',desc:'كل اليمين',cat:'JOIN'},
            {name:'FULL JOIN',desc:'الكل',cat:'JOIN'},
            {name:'CROSS JOIN',desc:'كل combination',cat:'JOIN'},
            {name:'COUNT(*)',desc:'عد الـ rows',cat:'AGG'},
            {name:'SUM(col)',desc:'مجموع',cat:'AGG'},
            {name:'AVG(col)',desc:'متوسط',cat:'AGG'},
            {name:'MIN / MAX',desc:'أصغر / أكبر',cat:'AGG'},
            {name:'GROUP BY',desc:'جمّع حسب column',cat:'GROUP'},
            {name:'HAVING',desc:'فلتر بعد GROUP BY',cat:'GROUP'},
            {name:'EXISTS',desc:'في نتيجة؟',cat:'SUB'},
            {name:'NOT EXISTS',desc:'مفيش نتيجة؟',cat:'SUB'},
            {name:'WITH xxx AS',desc:'CTE - جدول مؤقت',cat:'ADV'},
            {name:'EXCEPT',desc:'فرق بين sets',cat:'SET'},
            {name:'UNION',desc:'دمج sets بدون تكرار',cat:'SET'},
          ].map(item => {
            const catColors = {SELECT:'var(--violet)',FILTER:'var(--cyan)',SORT:'var(--green)',JOIN:'var(--pink)',AGG:'var(--orange)',GROUP:'var(--red)',SUB:'var(--violet-light)',ADV:'var(--text2)',SET:'var(--cyan-light)'};
            return (
              <div key={item.name} className="constraint-card" style={{borderTopColor:catColors[item.cat]}}>
                <h4 style={{fontFamily:'JetBrains Mono',fontSize:'0.72rem',color:catColors[item.cat]}}>{item.name}</h4>
                <p style={{fontSize:'0.72rem'}}>{item.desc} <span className="badge" style={{background:`${catColors[item.cat]}20`,color:catColors[item.cat],marginLeft:'4px'}}>{item.cat}</span></p>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ===== MAIN APP =====
function App() {
  const [activeSection, setActiveSection] = useState('ddl');
  const [activeItem, setActiveItem] = useState('');
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const mainRef = useRef(null);

  const scrollTo = (id) => {
    const el = document.getElementById(id);
    if (el) { el.scrollIntoView({behavior:'smooth', block:'start'}); setActiveItem(id); }
  };

  useEffect(() => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) setActiveItem(e.target.id);
      });
    }, {threshold: 0.3, rootMargin:'-60px 0px -60px 0px'});
    document.querySelectorAll('.topic-card[id]').forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, [activeSection]);

  const sectionContent = {
    ddl: <DDLSection/>,
    dml1: <DML1Section/>,
    dml2: <DML2Section/>,
    dml3: <DML3Section/>,
  };

  return (
    <div className="app-layout">
      {/* OVERLAY */}
      {sidebarOpen && <div className="overlay" onClick={() => setSidebarOpen(false)}/>}
      {/* SIDEBAR */}
      <aside className={`sidebar ${sidebarOpen?'open':''}`}>
        <div className="logo">
          {'<SQL/>'}
          <span></span>
        </div>
        {sections.map(sec => (
          <div key={sec.id} className="nav-section">
            <div className="nav-section-title">{sec.icon} {sec.label}</div>
            {sidebarItems[sec.id]?.map(item => (
              <div
                key={item.id}
                className={`nav-item ${activeItem===item.id?'scrollspy-active':''}`}
                onClick={() => { setSidebarOpen(false); if (activeSection!==sec.id) { setActiveSection(sec.id); setTimeout(() => scrollTo(item.id), 100); } else scrollTo(item.id); }}
              >
                <span className="icon">{item.icon}</span>
                {item.label}
              </div>
            ))}
          </div>
        ))}
      </aside>

      {/* MAIN */}
      <div className="main-content" ref={mainRef}>
        {/* TOPBAR */}
        <div className="topbar">
          <button className="hamburger" onClick={() => setSidebarOpen(!sidebarOpen)}>☰</button>
          <div style={{fontFamily:'JetBrains Mono',fontSize:'0.8rem',color:'var(--text3)',marginRight:'auto'}}>
            Database Systems Course
          </div>
          {sections.map(sec => (
            <button
              key={sec.id}
              className={`tab-btn ${activeSection===sec.id?'active':''}`}
              onClick={() => { setActiveSection(sec.id); mainRef.current?.scrollTo({top:0}); }}
            >
              {sec.icon} {sec.label}
            </button>
          ))}
        </div>

        {/* CONTENT */}
        <div className="content-area">
          {sectionContent[activeSection]}
        </div>

        {/* FOOTER */}
        <div style={{textAlign:'center',padding:'2rem',borderTop:'1px solid var(--border)',color:'var(--text3)',fontSize:'0.75rem',fontFamily:'JetBrains Mono'}}>
          {'</>'} SQL Interactive Tutorial • Made with ❤️ for Database Systems Students
        </div>
      </div>
    </div>
  );
}

<script>
  (function() {
    let lastScrollY = 0;
    const nav = document.getElementById('globalTopNav');
    document.addEventListener('scroll', function(e) {
      if (!nav) return;
      const target = e.target;
      const currentScrollY = target.scrollTop || window.scrollY;
      if (currentScrollY === undefined) return;
      
      if (currentScrollY > lastScrollY && currentScrollY > 60) {
        nav.classList.add('hidden');
      } else {
        nav.classList.remove('hidden');
      }
      lastScrollY = currentScrollY;
    }, true);
  })();
</script>
