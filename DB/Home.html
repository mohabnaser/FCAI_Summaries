<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>🎓 SQL + Quiz</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #080b14;
        --bg2: #0d1220;
        --bg3: #111827;
        --card: #141b2d;
        --border: #1e2d4a;
        --violet: #7c3aed;
        --violet-light: #a855f7;
        --cyan: #06b6d4;
        --cyan-light: #67e8f9;
        --green: #10b981;
        --orange: #f59e0b;
        --red: #ef4444;
        --pink: #ec4899;
        --text: #e2e8f0;
        --text2: #94a3b8;
        --text3: #475569;
        --glow-v: rgba(124, 58, 237, 0.3);
        --glow-c: rgba(6, 182, 212, 0.2);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Cairo", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
      }
      .home-btn {
        position: fixed;
        top: 18px;
        left: 18px;
        z-index: 120;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(6, 182, 212, 0.25);
        background: rgba(8, 11, 20, 0.92);
        color: var(--text);
        text-decoration: none;
        font-family: "Space Grotesk", sans-serif;
        font-size: 0.82rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      }
      .home-btn:hover {
        background: rgba(6, 182, 212, 0.1);
        border-color: rgba(6, 182, 212, 0.45);
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg2);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--violet);
        border-radius: 3px;
      }

      /* LAYOUT */
      .app-layout {
        display: flex;
        height: 100vh;
      }
      .sidebar {
        width: 260px;
        min-width: 260px;
        background: var(--bg2);
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        overflow-x: hidden;
        position: fixed;
        height: 100vh;
        right: 0;
        top: 0;
        z-index: 50;
        transition: transform 0.3s;
      }
      .main-content {
        margin-right: 260px;
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
      }
      .topbar {
        background: rgba(8, 11, 20, 0.95);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        padding: 0 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        position: sticky;
        top: 0;
        z-index: 40;
        height: 64px;
        flex-wrap: nowrap;
        overflow-x: auto;
      }
      .content-area {
        padding: 2rem;
        max-width: 1100px;
        margin: 0 auto;
      }

      /* LOGO */
      .logo {
        font-family: "JetBrains Mono", monospace;
        font-size: 1.05rem;
        font-weight: 700;
        background: linear-gradient(135deg, var(--violet-light), var(--cyan));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        padding: 1.5rem 1.25rem 1rem;
        border-bottom: 1px solid var(--border);
      }
      .logo span {
        display: block;
        font-family: "Cairo", sans-serif;
        font-size: 0.65rem;
        color: var(--text2);
        -webkit-text-fill-color: var(--text2);
        font-weight: 400;
        margin-top: 2px;
      }

      /* SIDEBAR NAV */
      .nav-section {
        padding: 0.5rem 0;
      }
      .nav-section-title {
        font-size: 0.6rem;
        font-family: "JetBrains Mono", monospace;
        letter-spacing: 0.12em;
        color: var(--text3);
        text-transform: uppercase;
        padding: 0.5rem 1.25rem 0.25rem;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        padding: 0.45rem 1.25rem;
        cursor: pointer;
        color: var(--text2);
        font-size: 0.8rem;
        border-right: 3px solid transparent;
        transition: all 0.15s;
        position: relative;
      }
      .nav-item:hover {
        color: var(--text);
        background: rgba(124, 58, 237, 0.08);
      }
      .nav-item.active {
        color: var(--violet-light);
        border-right-color: var(--violet);
        background: rgba(124, 58, 237, 0.12);
      }
      .nav-item .icon {
        font-size: 0.85rem;
        width: 18px;
        text-align: center;
      }
      .nav-item.scrollspy-active {
        color: var(--cyan-light);
        border-right-color: var(--cyan);
        background: rgba(6, 182, 212, 0.08);
      }

      /* TAB BUTTONS */
      .tab-btn {
        padding: 0.35rem 0.9rem;
        border-radius: 6px;
        font-size: 0.75rem;
        font-weight: 600;
        cursor: pointer;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text2);
        transition: all 0.15s;
        white-space: nowrap;
        font-family: "Cairo", sans-serif;
        flex-shrink: 0;
      }
      .tab-btn:hover {
        border-color: var(--violet);
        color: var(--violet-light);
      }
      .tab-btn.active {
        background: var(--violet);
        border-color: var(--violet);
        color: white;
        box-shadow: 0 0 16px var(--glow-v);
      }

      /* SECTION HERO */
      .section-hero {
        background: linear-gradient(135deg, var(--bg2) 0%, var(--card) 100%);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 2rem;
        margin-bottom: 2rem;
        position: relative;
        overflow: hidden;
      }
      .section-hero::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -20%;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: var(--glow-v);
        filter: blur(80px);
        pointer-events: none;
      }
      .section-hero h1 {
        font-size: 1.8rem;
        font-weight: 900;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, #fff, var(--violet-light));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .section-hero p {
        color: var(--text2);
        font-size: 0.88rem;
        line-height: 1.7;
        max-width: 600px;
      }
      .section-badge {
        display: inline-block;
        padding: 0.25rem 0.75rem;
        background: rgba(124, 58, 237, 0.2);
        border: 1px solid rgba(124, 58, 237, 0.4);
        border-radius: 100px;
        font-size: 0.7rem;
        font-family: "JetBrains Mono", monospace;
        color: var(--violet-light);
        margin-bottom: 0.75rem;
      }

      /* TOPIC CARD */
      .topic-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        scroll-margin-top: 80px;
        transition: border-color 0.2s;
      }
      .topic-card:hover {
        border-color: rgba(124, 58, 237, 0.4);
      }
      .topic-title {
        font-size: 1.05rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }
      .topic-title .icon {
        font-size: 1.2rem;
      }
      .topic-body {
        color: var(--text2);
        font-size: 0.87rem;
        line-height: 1.8;
      }
      .topic-body strong {
        color: var(--cyan-light);
      }
      .topic-body em {
        color: var(--orange);
        font-style: normal;
      }
      .note-box {
        background: rgba(6, 182, 212, 0.08);
        border: 1px solid rgba(6, 182, 212, 0.25);
        border-radius: 8px;
        padding: 0.75rem 1rem;
        margin-top: 0.75rem;
        font-size: 0.81rem;
        color: var(--cyan-light);
      }
      .warn-box {
        background: rgba(245, 158, 11, 0.08);
        border: 1px solid rgba(245, 158, 11, 0.25);
        border-radius: 8px;
        padding: 0.75rem 1rem;
        margin-top: 0.75rem;
        font-size: 0.81rem;
        color: var(--orange);
      }

      /* SQL CODE BLOCK */
      .sql-block {
        background: #060910;
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        margin-top: 1rem;
        font-size: 0.81rem;
      }
      .sql-block-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.5rem 1rem;
        background: rgba(255, 255, 255, 0.03);
        border-bottom: 1px solid var(--border);
        direction: ltr;
      }
      .sql-block-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.65rem;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        direction: ltr;
      }
      .sql-block-dots {
        display: flex;
        gap: 5px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .dot-r {
        background: #ef4444;
      }
      .dot-y {
        background: #f59e0b;
      }
      .dot-g {
        background: #10b981;
      }
      .sql-code {
        font-family: "JetBrains Mono", monospace;
        padding: 1rem 1.25rem;
        line-height: 1.7;
        overflow-x: auto;
        white-space: pre;
        direction: ltr;
        text-align: left;
      }
      .kw {
        color: #7c3aed;
        font-weight: 600;
      }
      .kw2 {
        color: #a855f7;
      }
      .fn {
        color: #06b6d4;
      }
      .str {
        color: #10b981;
      }
      .num {
        color: #f59e0b;
      }
      .cmt {
        color: #475569;
        font-style: italic;
      }
      .op {
        color: #ec4899;
      }
      .tbl {
        color: #e2e8f0;
      }
      .col {
        color: #bfdbfe;
      }

      /* DATA TABLE */
      .data-table-wrap {
        overflow-x: auto;
        margin-top: 0.75rem;
        direction: ltr;
      }
      .data-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.77rem;
        font-family: "JetBrains Mono", monospace;
      }
      .data-table th {
        background: rgba(124, 58, 237, 0.15);
        color: var(--violet-light);
        padding: 0.5rem 0.75rem;
        text-align: left;
        border: 1px solid var(--border);
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .data-table td {
        padding: 0.4rem 0.75rem;
        border: 1px solid rgba(30, 45, 74, 0.6);
        color: var(--text2);
        text-align: left;
      }
      .data-table tr:hover td {
        background: rgba(124, 58, 237, 0.05);
        color: var(--text);
      }
      .data-table td.null {
        color: var(--text3);
        font-style: italic;
      }
      .data-table td.highlighted {
        background: rgba(124, 58, 237, 0.15);
        color: var(--violet-light);
      }
      .data-table td.result {
        background: rgba(16, 185, 129, 0.08);
        color: var(--green);
      }

      /* VISUALIZER */
      .viz-container {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.25rem;
        margin-top: 1rem;
      }
      .viz-title {
        font-size: 0.75rem;
        font-family: "JetBrains Mono", monospace;
        color: var(--cyan);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        direction: ltr;
      }
      .viz-grid {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 1rem;
        align-items: start;
      }
      .viz-label {
        font-size: 0.65rem;
        font-family: "JetBrains Mono", monospace;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 0.4rem;
        direction: ltr;
        text-align: left;
      }

      /* JOIN VISUALIZER */
      .join-container {
        margin-top: 1rem;
      }
      .join-tabs {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-bottom: 1.25rem;
        direction: ltr;
      }
      .join-tab {
        padding: 0.35rem 0.85rem;
        border-radius: 6px;
        font-size: 0.74rem;
        font-weight: 600;
        cursor: pointer;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text2);
        transition: all 0.15s;
        font-family: "JetBrains Mono", monospace;
      }
      .join-tab:hover {
        border-color: var(--violet);
        color: var(--violet-light);
      }
      .join-tab.active {
        background: var(--violet);
        border-color: var(--violet);
        color: white;
      }
      .join-layout {
        display: grid;
        grid-template-columns: 1fr 200px 1fr;
        gap: 1rem;
        align-items: start;
      }
      .result-section {
        margin-top: 1.25rem;
      }
      .result-label {
        font-size: 0.65rem;
        font-family: "JetBrains Mono", monospace;
        color: var(--green);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 0.5rem;
        display: flex;
        align-items: center;
        gap: 0.4rem;
        direction: ltr;
      }
      .result-count {
        background: rgba(16, 185, 129, 0.15);
        border: 1px solid rgba(16, 185, 129, 0.3);
        border-radius: 100px;
        padding: 0.1rem 0.5rem;
        font-size: 0.65rem;
        color: var(--green);
      }

      /* CONSTRAINT CARDS */
      .constraint-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 0.75rem;
        margin-top: 0.75rem;
      }
      .constraint-card {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.9rem;
        border-top: 3px solid transparent;
        transition: all 0.2s;
      }
      .constraint-card:hover {
        border-top-color: var(--violet);
        transform: translateY(-2px);
      }
      .constraint-card h4 {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.78rem;
        font-weight: 700;
        margin-bottom: 0.4rem;
        color: var(--violet-light);
      }
      .constraint-card p {
        font-size: 0.74rem;
        color: var(--text2);
        line-height: 1.6;
      }

      /* AGGREGATE VISUALIZER */
      .agg-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-top: 0.75rem;
      }
      .agg-step {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1rem;
      }
      .agg-step-title {
        font-size: 0.65rem;
        font-family: "JetBrains Mono", monospace;
        color: var(--orange);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 0.6rem;
      }

      /* GROUP VIZ */
      .group-viz {
        margin-top: 0.75rem;
        direction: ltr;
        text-align: left;
      }
      .group-item {
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-bottom: 0.5rem;
        overflow: hidden;
      }
      .group-header {
        padding: 0.4rem 0.75rem;
        font-size: 0.75rem;
        font-family: "JetBrains Mono", monospace;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .group-rows {
        padding: 0.25rem 0.5rem 0.5rem;
      }
      .group-row {
        font-size: 0.72rem;
        font-family: "JetBrains Mono", monospace;
        color: var(--text2);
        padding: 0.15rem 0.25rem;
      }

      /* STEP INDICATOR */
      .steps {
        display: flex;
        gap: 0;
        margin: 1rem 0;
      }
      .step {
        flex: 1;
        padding: 0.6rem 0.75rem;
        background: var(--bg2);
        border: 1px solid var(--border);
        font-size: 0.72rem;
        text-align: center;
        color: var(--text2);
        position: relative;
      }
      .step:first-child {
        border-radius: 8px 0 0 8px;
      }
      .step:last-child {
        border-radius: 0 8px 8px 0;
      }
      .step.active {
        background: rgba(124, 58, 237, 0.15);
        color: var(--violet-light);
        border-color: var(--violet);
      }
      .step-num {
        display: block;
        font-size: 0.6rem;
        color: var(--text3);
        font-family: "JetBrains Mono", monospace;
        margin-bottom: 0.15rem;
      }

      /* BADGE */
      .badge {
        display: inline-block;
        padding: 0.15rem 0.5rem;
        border-radius: 4px;
        font-size: 0.65rem;
        font-family: "JetBrains Mono", monospace;
        font-weight: 600;
      }
      .badge-v {
        background: rgba(124, 58, 237, 0.2);
        color: var(--violet-light);
      }
      .badge-c {
        background: rgba(6, 182, 212, 0.2);
        color: var(--cyan-light);
      }
      .badge-g {
        background: rgba(16, 185, 129, 0.2);
        color: var(--green);
      }
      .badge-o {
        background: rgba(245, 158, 11, 0.2);
        color: var(--orange);
      }
      .badge-r {
        background: rgba(239, 68, 68, 0.2);
        color: var(--red);
      }

      /* TWO/THREE COLS */
      .two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-top: 0.75rem;
      }
      .three-col {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 0.75rem;
        margin-top: 0.75rem;
      }
      .sep {
        border: none;
        border-top: 1px solid var(--border);
        margin: 1.5rem 0;
      }

      /* HAMBURGER */
      .hamburger {
        display: none;
        background: none;
        border: none;
        color: var(--text);
        font-size: 1.4rem;
        cursor: pointer;
        padding: 0.25rem;
        flex-shrink: 0;
      }

      /* EXEC ORDER */
      .exec-flow {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
        margin: 1rem 0;
        direction: ltr;
      }
      .exec-step {
        padding: 0.5rem 1rem;
        border-radius: 8px;
        font-size: 0.78rem;
        font-family: "JetBrains Mono", monospace;
        font-weight: 600;
        border: 1px solid var(--border);
        background: var(--bg2);
        color: var(--text2);
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
      }
      .exec-step:hover {
        border-color: var(--violet);
        color: var(--violet-light);
      }
      .exec-step.active {
        background: var(--violet);
        border-color: var(--violet);
        color: white;
        box-shadow: 0 0 20px var(--glow-v);
      }
      .exec-step .exec-num {
        position: absolute;
        top: -8px;
        right: -6px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--cyan);
        color: var(--bg);
        font-size: 0.55rem;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .exec-arrow {
        color: var(--text3);
        font-size: 1rem;
      }

      /* SUBQUERY */
      .subquery-outer {
        border: 2px solid var(--violet);
        border-radius: 8px;
        padding: 0.75rem;
        position: relative;
        direction: ltr;
        text-align: left;
      }
      .subquery-inner {
        border: 2px solid var(--cyan);
        border-radius: 6px;
        padding: 0.75rem;
        margin-top: 0.5rem;
        position: relative;
      }
      .subquery-tag {
        position: absolute;
        top: -0.6rem;
        left: 0.75rem;
        direction: ltr;
        background: var(--bg);
        padding: 0 0.4rem;
        font-size: 0.6rem;
        font-family: "JetBrains Mono", monospace;
      }
      .subquery-tag-v {
        color: var(--violet-light);
      }
      .subquery-tag-c {
        color: var(--cyan-light);
      }

      /* ANIMATIONS */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-in {
        animation: fadeIn 0.3s ease;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      .pulse {
        animation: pulse 2s ease-in-out infinite;
      }

      /* PROGRESS BAR */
      .progress-bar {
        height: 3px;
        background: var(--border);
        border-radius: 3px;
        overflow: hidden;
        margin: 0.5rem 0;

    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      /* ===== MARKDOWN CODE BLOCK PARSER ===== */
      function formatTextWithCode(text) {
        if (!text) return null;
        const parts = text.split(/(```[\s\S]*?```|`[^`\n]+`)/g);
        return parts.map((part, index) => {
          if (part.startsWith("```") && part.endsWith("```")) {
            let code = part.slice(3, -3);
            const firstLineBreak = code.indexOf("\n");
            if (firstLineBreak !== -1) {
              const firstLine = code.substring(0, firstLineBreak).trim();
              if (["sql", "javascript", "js", "css", "html"].includes(firstLine.toLowerCase())) {
                code = code.substring(firstLineBreak + 1);
              }
            }
            return (
              <pre key={index} className="quiz-q-code">
                <code>{code.trim()}</code>
              </pre>
            );
          } else if (part.startsWith("`") && part.endsWith("`")) {
            const code = part.slice(1, -1);
            return (
              <code key={index} className="quiz-inline-code">
                {code}
              </code>
            );
          } else {
            const subparts = part.split("\n");
            return subparts.map((subpart, subidx) => (
              <React.Fragment key={`${index}-${subidx}`}>
                {subpart}
                {subidx < subparts.length - 1 && <br />}
              </React.Fragment>
            ));
          }
        });
      }

      /* ===== HTML ESCAPE ===== */
      function escHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      /* ===== SQL HIGHLIGHTER ===== */
      function highlight(sql) {
        const KW = new Set([
          "SELECT",
          "FROM",
          "WHERE",
          "INSERT",
          "INTO",
          "VALUES",
          "UPDATE",
          "SET",
          "DELETE",
          "CREATE",
          "TABLE",
          "DATABASE",
          "ALTER",
          "DROP",
          "ADD",
          "COLUMN",
          "CONSTRAINT",
          "REFERENCES",
          "DEFAULT",
          "UNIQUE",
          "CHECK",
          "TRUNCATE",
          "INNER",
          "LEFT",
          "RIGHT",
          "FULL",
          "OUTER",
          "JOIN",
          "ON",
          "HAVING",
          "ASC",
          "DESC",
          "DISTINCT",
          "AS",
          "AND",
          "OR",
          "NOT",
          "IN",
          "BETWEEN",
          "LIKE",
          "EXISTS",
          "EXCEPT",
          "UNION",
          "INTERSECT",
          "WITH",
          "LIMIT",
          "TOP",
          "IDENTITY",
          "CASCADE",
          "COUNT",
          "SUM",
          "AVG",
          "MIN",
          "MAX",
          "NULL",
          "TRUE",
          "FALSE",
          "INT",
          "INTEGER",
          "VARCHAR",
          "FLOAT",
          "CHAR",
          "SMALLINT",
          "BIGINT",
          "DATE",
          "DATETIME",
          "TIMESTAMP",
          "BOOLEAN",
          "MONEY",
          "ANY",
          "ALL",
          "SOME",
          "YEAR",
          "MONTH",
          "GETDATE",
          "CURRENT_TIMESTAMP",
          "PRIMARY",
          "FOREIGN",
          "KEY",
          "ORDER",
          "GROUP",
          "BY",
          "IS",
          "NVARCHAR",
          "REAL",
          "VARBINARY",
          "BIT",
          "DECIMAL",
          "NCHAR",
          "ROLLBACK",
          "COMMIT",
          "BEGIN",
          "TRANSACTION",
          "INDEX",
          "VIEW",
          "PROCEDURE",
          "FUNCTION",
          "TRIGGER",
          "EXEC",
          "EXECUTE",
          "BACKUP",
          "RESTORE",
        ]);
        const OPS = new Set(Array.from("=<>!,;()*[]+-/"));
        let out = "",
          i = 0;
        const n = sql.length;
        while (i < n) {
          const ch = sql[i];
          if (ch === "-" && sql[i + 1] === "-") {
            let j = i;
            while (j < n && sql[j] !== "\n") j++;
            out += `<span class="cmt">${escHtml(sql.slice(i, j))}</span>`;
            i = j;
          } else if (ch === "'") {
            let j = i + 1;
            while (j < n && sql[j] !== "'") j++;
            out += `<span class="str">${escHtml(sql.slice(i, j + 1))}</span>`;
            i = j + 1;
          } else if (/[a-zA-Z_\u0600-\u06FF]/.test(ch)) {
            let j = i;
            while (j < n && /[\w\u0600-\u06FF]/.test(sql[j])) j++;
            const w = sql.slice(i, j);
            out += KW.has(w.toUpperCase())
              ? `<span class="kw">${escHtml(w.toUpperCase())}</span>`
              : escHtml(w);
            i = j;
          } else if (/\d/.test(ch)) {
            let j = i;
            while (j < n && /[\d.]/.test(sql[j])) j++;
            out += `<span class="num">${escHtml(sql.slice(i, j))}</span>`;
            i = j;
          } else if (OPS.has(ch)) {
            out += `<span class="op">${escHtml(ch)}</span>`;
            i++;
          } else {
            out += escHtml(ch);
            i++;
          }
        }
        return out;
      }

      /* ===== SQL BLOCK ===== */
      function SQLBlock({ code, title }) {
        const [copied, setCopied] = useState(false);
        const copy = () => {
          navigator.clipboard?.writeText(code).catch(() => {});

      function QuizQuestion({
        question,
        index,
        userAnswer,
        submitted,
        onSelect,
      }) {
        const isAnswered = userAnswer !== undefined;
        const isCorrect = submitted && userAnswer === question.correct;
        const isWrong = submitted && isAnswered && !isCorrect;

        const letters = ["A", "B", "C", "D", "E"];

        let qCls = "quiz-q";
        if (submitted && isCorrect) qCls += " q-correct-border";
        else if (submitted && isWrong) qCls += " q-wrong-border";
        else if (submitted && !isAnswered) qCls += " q-skip-border";

        return (
          <div className={qCls}>
            <div className="quiz-q-header">
              <span className="quiz-q-num">Q{index + 1}</span>
              <span className="quiz-q-year">📅 {question.year}</span>
              <span className="quiz-q-tag">🏷 {question.tag}</span>
              {submitted && isCorrect && (
                <span className="quiz-q-status q-status-correct">
                  ✓ إجابة صحيحة
                </span>
              )}
              {submitted && isWrong && (
                <span className="quiz-q-status q-status-wrong">
                  ✗ إجابة خاطئة
                </span>
              )}
              {submitted && !isAnswered && (
                <span className="quiz-q-status q-status-skip">— لم يُجب</span>
              )}
            </div>

            <div className="quiz-q-text">{formatTextWithCode(question.text)}</div>

            <div className="quiz-q-options">
              {question.options.map((opt, j) => {
                let cls = "quiz-opt";
                if (!submitted) {
                  if (userAnswer === j) cls += " quiz-opt-selected";
                } else {
                  cls += " quiz-opt-disabled";
                  if (j === question.correct) cls += " quiz-opt-correct";
                  else if (userAnswer === j) cls += " quiz-opt-wrong";
                }
                return (
                  <div
                    key={j}
                    className={cls}
                    onClick={() => !submitted && onSelect(j)}
                  >
                    <span className="quiz-opt-letter">{letters[j]}</span>
                    <span className="quiz-opt-text">{formatTextWithCode(opt)}</span>
                    {submitted && j === question.correct && (
                      <span className="quiz-opt-icon">✓</span>
                    )}
                    {submitted &&
                      userAnswer === j &&
                      j !== question.correct && (
                        <span className="quiz-opt-icon">✗</span>
                      )}
                  </div>
                );
              })}
            </div>

            {submitted && (
              <div
                className={`quiz-explanation ${isCorrect ? "exp-correct" : isAnswered ? "exp-wrong" : "exp-skip"}`}
              >
                <div className="exp-icon">{isCorrect ? "💡" : "📖"}</div>
                <div className="exp-text">{formatTextWithCode(question.explanation)}</div>
              </div>
            )}
          </div>
        );
      }

      function QuizSection({ questions, sectionName, color }) {
        const [userAnswers, setUserAnswers] = useState({});
        const [submitted, setSubmitted] = useState(false);
        const [score, setScore] = useState(null);
        const topRef = useRef(null);

        const handleSelect = (qIdx, optIdx) => {
          if (submitted) return;
          setUserAnswers((prev) => ({ ...prev, [qIdx]: optIdx }));
        };

        const handleSubmit = () => {
          let correct = 0;
          questions.forEach((q, i) => {
            if (userAnswers[i] === q.correct) correct++;
          });
          setScore(correct);
          setSubmitted(true);
          setTimeout(
            () =>
              topRef.current?.scrollIntoView({
                behavior: "smooth",
                block: "start",
              }),
            100,
          );
        };

        const handleReset = () => {
          setUserAnswers({});
          setSubmitted(false);
          setScore(null);
          topRef.current?.scrollIntoView({
            behavior: "smooth",
            block: "start",
          });
        };

        const answered = Object.keys(userAnswers).length;
        const total = questions.length;
        const pct = total > 0 ? Math.round((answered / total) * 100) : 0;
        const scorePct = score !== null ? Math.round((score / total) * 100) : 0;

        let scoreCls = "quiz-score-badge";
        let resultCls = "quiz-result-card";
        let emoji = "💪";
        let msg = "";
        let sub = "";
        if (score !== null) {
          if (scorePct >= 90) {
            scoreCls += " score-great";
            resultCls += " result-great";
            emoji = "🏆";
            msg = "ممتاز! أنت جاهز للامتحان!";
            sub = "درجة رائعة، استمر!";
          } else if (scorePct >= 70) {
            scoreCls += " score-good";
            resultCls += " result-good";
            emoji = "🎉";
            msg = "كويس جداً!";
            sub = "راجع الأسئلة اللي غلطت فيها.";
          } else if (scorePct >= 50) {
            scoreCls += " score-mid";
            resultCls += " result-mid";
            emoji = "📚";
            msg = "مش بعيد!";
            sub = "راجع الشرح وحاول تاني.";
          } else {
            scoreCls += " score-bad";
            resultCls += " result-bad";
            emoji = "💪";
            msg = "ذاكر كويس وارجع!";
            sub = "اقرأ الشرح مرة تانية.";
          }
        }

        const accentColor = color || "var(--violet)";

        return (
          <div className="quiz-wrapper" ref={topRef}>
            {/* Header */}
            <div className="quiz-header-card">
              <div className="quiz-header-left">
                <div className="quiz-header-icon">🎯</div>
                <div>
                  <div className="quiz-header-title">Quiz: {sectionName}</div>
                  <div className="quiz-header-meta">
                    {total} سؤال من امتحانات حقيقية 2023 • 2024 • 2025
                  </div>
                </div>
              </div>
              <div className="quiz-header-right">
                {!submitted ? (
                  <span className="quiz-progress-text">

              <div className="three-col">
                <div
                  className="constraint-card"
                  style={{ borderTopColor: "var(--violet)" }}
                >
                  <h4 style={{ color: "var(--violet-light)" }}>
                    UNION (R ∪ S)
                  </h4>

                    <strong>Duplicates بتتشال تلقائياً.</strong>

                <div
                  className="constraint-card"

                >
                  <h4 style={{ color: "var(--cyan-light)" }}>
                    INTERSECTION (R ∩ S)
                  </h4>
                  <p>الـ Tuples الموجودة في R و S الاتنين.</p>
                  <span className="badge badge-g" style={{ marginTop: ".4rem" }}>
                    Commutative
                  </span>
                </div>
                <div
                  className="constraint-card"
                  style={{ borderTopColor: "var(--red)" }}
                >
                  <h4 style={{ color: "var(--red)" }}>

                  </h4>
                  <p>الـ Tuples اللي في R بس مش في S.</p>
                  <span className="badge badge-r" style={{ marginTop: ".4rem" }}>
                    NOT Commutative

                </div>

STUDENT (ST-ID, Name, Nation-ID, Address, Major, GPA)
PROF    (P-ID,  Name, Works-in,  Rank,    Add,   Specialty)

-- Step 1: Extract a single compatible attribute (Address)
STADD    ←  π Address (STUDENT)
PROFADD  ←  π Add     (PROF)

-- Step 2: Queries
RESULT  ←  STADD ∪ PROFADD     -- Student OR Prof lives
RESULT  ←  STADD − PROFADD     -- Student lives, no Prof
RESULT  ←  STADD ∩ PROFADD     -- Both Student and Prof live`}
              />

                <div

                  style={{ borderTopColor: "var(--green)" }}

                  <p
                    style={{
                      fontFamily: "JetBrains Mono",
                      fontSize: ".72rem",

                    R ∪ S = S ∪ R
                    <br />R ∩ S = S ∩ R

                </div>
                <div
                  className="constraint-card"

                    style={{
                      fontFamily: "JetBrains Mono",
                      fontSize: ".72rem",

                <div
                  className="constraint-card"

                    style={{

                <strong>Symbol:</strong> ⋈ (Bowtie) &nbsp; • &nbsp;{" "}

              <SQLBlock
                title="From Cartesian × Selection → JOIN"
                code={`-- Equivalent expressions:

                <br />• <strong>Symbol:</strong> *
                <br />• بيشيل الـ Duplicate Column أوتوماتيك.
                <br />• الـ Matching attributes لازم يكون عندهم{" "}
                <strong>نفس الاسم و نفس النوع</strong> في الجدولين.
                <br />• لو الأسماء مختلفة، لازم نعمل ρ (rename) الأول.

              <SQLBlock

S(C, D, E)

Q  ←  R * S

-- Implicit: R.C = S.C  ∧  R.D = S.D
-- Resulting schema: Q(A, B, C, D, E)`}

                  { sym: "×", name: "CARTESIAN PRODUCT", desc: "All pairs |R| × |S|", color: "var(--violet-light)" },
                  { sym: "⋈", name: "JOIN", desc: "Cartesian + Selection (Theta / Equi)", color: "var(--cyan-light)" },
                  { sym: "✱", name: "NATURAL JOIN", desc: "Equijoin without duplicate columns", color: "var(--green)" },
                  { sym: "⟕", name: "LEFT OUTER", desc: "All rows from left + matches", color: "var(--violet)" },
                  { sym: "⟖", name: "RIGHT OUTER", desc: "All rows from right + matches", color: "var(--cyan)" },
                  { sym: "⟗", name: "FULL OUTER", desc: "All rows from both sides", color: "var(--orange)" },
                  { sym: "÷", name: "DIVISION", desc: "Tuples in R associated with ALL of S", color: "var(--text2)" },
                ].map((s) => (
                  <div
                    key={s.name}
                    className="constraint-card"
                    style={{ borderTopColor: s.color }}
                  >
                    <h4
                      style={{
                        color: s.color,
                        fontSize: "1.1rem",
                        fontFamily: "JetBrains Mono",
                      }}

                      {s.sym} &nbsp;
                      <span style={{ fontSize: ".72rem" }}>{s.name}</span>
                    </h4>
                    <p style={{ marginTop: ".25rem" }}>{s.desc}</p>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      /* =====================================================
         MAIN APP
      ===================================================== */
      function App() {
        const [activeSection, setActiveSection] = useState("ddl");
        const [activeItem, setActiveItem] = useState("");
        const [sidebarOpen, setSidebarOpen] = useState(false);
        const mainRef = useRef(null);

        const scrollTo = (id) => {
          const el = document.getElementById(id);
          if (el) {
            el.scrollIntoView({ behavior: "smooth", block: "start" });
            setActiveItem(id);
          }
          setSidebarOpen(false);
        };

        useEffect(() => {
          const obs = new IntersectionObserver(
            (entries) => {
              entries.forEach((e) => {
                if (!e.isIntersecting) return;
                // If this is a section wrapper, update activeSection
                if (e.target.dataset && e.target.dataset.section) {
                  setActiveSection(e.target.dataset.section);
                } else if (e.target.id) {
                  // topic-card with an id -> highlight in sidebar
                  setActiveItem(e.target.id);
                }
              });
            },
            { threshold: 0.2, rootMargin: "-60px 0px -60px 0px" },
          );
          document
            .querySelectorAll(
              ".topic-card[id], .quiz-wrapper, .section-wrapper",
            )
            .forEach((el) => obs.observe(el));
          return () => obs.disconnect();
        }, []);

        const sectionContent = {
          ddl: <DDLSection />,
          dml1: <DML1Section />,
          dml2: <DML2Section />,
          dml3: <DML3Section />,
          ra: <RelationalAlgebraSection />,
        };

        return (
          <div className="app-layout">
            {/* Overlay */}
            {sidebarOpen && (
              <div className="overlay" onClick={() => setSidebarOpen(false)} />
            )}

            {/* Sidebar */}
            <aside className={`sidebar ${sidebarOpen ? "open" : ""}`}>
              <div className="logo">
                {"<SQL/>"}
                <span>Database Systems Course + Quiz</span>
              </div>
              {sections.map((sec) => (
                <div key={sec.id} className="nav-section">
                  <div className="nav-section-title">
                    {sec.icon} {sec.label}
                  </div>
                  {sidebarItems[sec.id]?.map((item) => (
                    <div
                      key={item.id}
                      className={`nav-item ${activeItem === item.id ? "scrollspy-active" : ""}`}
                      onClick={() => {
                        scrollTo(item.id);
                      }}
                    >
                      <span className="icon">{item.icon}</span>
                      {item.label}
                    </div>
                  ))}
                </div>
              ))}
            </aside>

            {/* Main */}
            <div className="main-content" ref={mainRef}>
              {/* Topbar */}
              <div className="topbar">
                <button
                  className="hamburger"
                  onClick={() => setSidebarOpen(!sidebarOpen)}
                >
                  ☰
                </button>
                <div
                  style={{
                    fontFamily: "JetBrains Mono",
                    fontSize: ".75rem",
                    color: "var(--text3)",
                    whiteSpace: "nowrap",
                  }}
                >
                  DB Systems
                </div>
                {sections.map((sec) => (
                  <button
                    key={sec.id}
                    className={`tab-btn ${activeSection === sec.id ? "active" : ""}`}
                    onClick={() => {
                      scrollTo(sec.id);
                    }}
                  >
                    {sec.icon} {sec.label}
                  </button>
                ))}
              </div>

              {/* Mobile floating hamburger (right) */}
              <button
                className="mobile-hamburger"
                onClick={() => setSidebarOpen(!sidebarOpen)}
              >
                ☰
              </button>
              {/* Content */}
              <div className="content-area" style={{ paddingTop: "1.5rem" }}>
                {sections.map((sec) => (
                  <div
                    key={sec.id}
                    id={sec.id}
                    className="section-wrapper"
                    data-section={sec.id}
                    style={{ marginBottom: "2rem" }}
                  >
                    {sectionContent[sec.id]}
                  </div>
                ))}
              </div>

              {/* Footer */}
              <div
                style={{
                  textAlign: "center",
                  padding: "2rem",
                  borderTop: "1px solid var(--border)",
                  color: "var(--text3)",
                  fontSize: ".75rem",
                  fontFamily: "JetBrains Mono",
                }}
              >
                {"</>"} SQL Interactive Tutorial + Quiz • امتحانات 2023 • 2024 •
                2025
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.render(<App />, document.getElementById("root"));
    </script>

    <!-- GLOBAL TOP NAV -->
    <style>
      .global-top-nav {
        position: fixed;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999999;
        background: rgba(13, 18, 32, 0.75);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 100px;
        display: flex;
        padding: 6px;
        gap: 4px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        animation: slideDownNav 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes slideDownNav {
        0% {
          transform: translateX(-50%) translateY(-100px);
          opacity: 0;
        }
        100% {
          transform: translateX(-50%) translateY(0);
          opacity: 1;
        }

        padding: 10px 22px;
        border-radius: 100px;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .gnav-item:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.05);
      }

        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }

        background: #00d4ff;
        box-shadow: 0 0 10px #00d4ff;
      }

        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        transition: all 0.3s;
        flex-shrink: 0;
      }
      @media (max-width: 768px) {
        .global-top-nav {
          top: 8px;
          width: calc(100% - 16px);
          padding: 4px;
          justify-content: space-between;
          border-radius: 14px;
        }

          padding: 8px 10px;
          font-size: 0.78rem;
          flex: 1;
          justify-content: center;
        }
      }
    </style>

        ><div class="gnav-dot"></div>
        SQL Basics</a
      >

        ><div class="gnav-dot"></div>
        ER &amp; Mapping</a
      >
      <a href="ERD2.html" class="gnav-item"
        ><div class="gnav-dot"></div>
        EER &amp; Norm</a
      >
    </div>
    <script>
      (function () {
        var lastY = 0,
          nav = document.getElementById("globalTopNav");
        document.addEventListener(
          "scroll",
          function (e) {
            if (!nav) return;
            var t = e.target,
              y = t.scrollTop || window.scrollY;
            if (y === undefined) return;
            if (y > lastY && y > 60) nav.classList.add("hidden");
            else nav.classList.remove("hidden");
            lastY = y;
          },
          true,
        );
      })();
    </script>
